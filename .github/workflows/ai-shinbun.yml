name: AI新聞 毎日自動生成

on:
  schedule:
    - cron: '0 19 * * *'  # 毎日 04:00 JST (UTC 19:00)
  workflow_dispatch:       # 手動実行も可能

jobs:
  generate-newspaper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Generate AI newspaper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'PYEOF'
          import os
          import re
          import datetime
          import requests
          from google import genai
          from google.genai import types

          # 日付設定（JST）
          jst = datetime.timezone(datetime.timedelta(hours=9))
          today = datetime.datetime.now(jst)
          date_str = today.strftime('%Y%m%d')
          year = today.year
          month = today.month
          day = today.day
          weekdays = ['月', '火', '水', '木', '金', '土', '日']
          weekday = weekdays[today.weekday()]

          output_path = f'ai-shinbun/newspaper_{date_str}.html'

          if os.path.exists(output_path):
              print(f'{output_path} already exists, skipping.')
              exit(0)

          client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])

          prompt = f"""{year}年{month}月{day}日付のAI新聞HTMLを生成してください。

まずGoogle検索で以下を調べて最新AIニュースを収集してください：
- "AI news {year} {month}/{day}"
- "人工知能 最新ニュース {year}年{month}月"
- "Claude GPT Gemini LLM news {year}"

収集したニュースをもとに、以下の仕様で完全なAI新聞HTMLを生成してください。

## 文字数制限（厳守・超過すると表示が切れる）
- 主記事（上段右・最重要）: 400文字以内
- 第2記事（上段右から2番目）: 260文字以内
- 第3記事: 200文字以内
- 第4記事: 140文字以内
- 短信6本（左上ゾーン）: 各83文字以内
- 下段3本: 各400文字以内

## 色アクセント
- 数値・統計・日付: <span style="color:#b0001e;font-weight:700;">数値</span>
- 固有名詞・組織名: <span style="color:#0d3461;font-weight:700;">名前</span>

## レイアウト仕様（SVG縦書き紙面、viewBox="0 0 1800 900"）
上段（y=0〜530）右→左に4記事＋短信6本、下段（y=530〜900）3記事。
縦書きはwriting-mode="tb-rl"使用。foreignObjectでHTML本文を配置。

## 絶対守るルール
- foreignObject内のテキストは文字数制限を守る
- 全見出しはSVG text要素（writing-mode="tb-rl"）で縦書き
- 実際に収集したニュースで記事を書く（架空ニュース禁止）
- <!DOCTYPE html>から</html>まで完全なHTMLを出力する

