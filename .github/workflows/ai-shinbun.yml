上記テンプレートの【】をすべて実際の内容に置き換えた完全なHTMLのみを出力してください。"""

          print(f"Generating newspaper for {date_str} using Gemini with Google Search...")

          response = client.models.generate_content(
              model='gemini-2.0-flash',
              contents=prompt,
              config=types.GenerateContentConfig(
                  tools=[types.Tool(google_search=types.GoogleSearch())],
                  max_output_tokens=16000,
              )
          )

          html_content = response.text

          # HTMLブロック抽出
          match = re.search(r'<!DOCTYPE html>.*?</html>', html_content, re.DOTALL | re.IGNORECASE)
          if match:
              html_content = match.group(0)

          os.makedirs('ai-shinbun', exist_ok=True)
          with open(output_path, 'w', encoding='utf-8') as f:
              f.write(html_content)
          print(f"Saved: {output_path} ({len(html_content)} chars)")

          # index.html更新
          index_path = 'ai-shinbun/index.html'
          with open(index_path, 'r', encoding='utf-8') as f:
              index_html = f.read()

          # すでにこの日付のカードがあればスキップ
          if f'newspaper_{date_str}.html' in index_html:
              print(f"Card for {date_str} already in index.html, skipping.")
          else:
              new_card = f'''      <a class="newspaper-card" href="newspaper_{date_str}.html" style="animation-delay:0.05s">
        <div class="card-date-num">{month}月{day}日</div>
        <div class="card-date-str">{year}年{month}月{day}日（{weekday}）</div>
        <div class="card-label">朝刊 <span class="card-arrow">→</span></div>
      </a>

      '''
              index_html = index_html.replace(
                  '      <a class="newspaper-card" href="newspaper_',
                  new_card + '      <a class="newspaper-card" href="newspaper_',
                  1
              )
              with open(index_path, 'w', encoding='utf-8') as f:
                  f.write(index_html)
              print(f"Updated: {index_path}")

          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-shinbun/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "AI新聞 $(TZ=Asia/Tokyo date '+%Y年%m月%d日')号を追加 [Gemini自動生成]"
          git pull --rebase origin main
          git push origin main
