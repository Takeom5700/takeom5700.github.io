  生成AI市場・最重要動向　OpenAI新フラグシップ発表
</text>
<line x1="1260" y1="17" x2="1800" y2="17" stroke="#aaa" stroke-width="0.5"/>

<text font-family="'Noto Serif JP','Yu Mincho',serif"
      font-weight="900" font-size="36" fill="#111"

      clip-path="url(#c-main)">GPT-5.6三層</text>
<text font-family="'Noto Serif JP','Yu Mincho',serif"
      font-weight="900" font-size="36" fill="#111"
      writing-mode="tb-rl" x="1716" y="24"
      clip-path="url(#c-main)">公開で価格戦争</text>

<foreignObject x="1260" y="22" width="448" height="508">
<div xmlns="http://www.w3.org/1999/xhtml"
     style="writing-mode:vertical-rl;height:508px;width:448px;overflow:hidden;
            font-family:'Noto Serif JP','Yu Mincho',serif;
            font-size:14px;line-height:1.85;text-align:justify;
            padding:0 8px;color:#111;">
  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">OpenAI</span>は6月29日、新世代フラグシップモデル<span style="color:#0d3461;font-weight:700;">GPT-5.6</span>を三段階構成で発表した。最上位の<span style="color:#0d3461;font-weight:700;">Sol</span>、バランス型の<span style="color:#0d3461;font-weight:700;">Terra</span>、低コスト型の<span style="color:#0d3461;font-weight:700;">Luna</span>の三モデルで構成される。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">性能と価格の両立</p>
  <p style="text-indent:1em;margin:0 0 2px;">Solは独自ベンチマーク<span style="color:#0d3461;font-weight:700;">Terminal-Bench 2.1</span>で<span style="color:#b0001e;font-weight:700;">91.9%</span>を記録し、<span style="color:#0d3461;font-weight:700;">Claude Mythos 5</span>の<span style="color:#b0001e;font-weight:700;">88.0%</span>を上回った。Terraは入力<span style="color:#b0001e;font-weight:700;">2.50ドル</span>・出力<span style="color:#b0001e;font-weight:700;">15ドル</span>（百万トークン当たり）と競合の<span style="color:#0d3461;font-weight:700;">Claude Sonnet</span>比で約<span style="color:#b0001e;font-weight:700;">17%</span>割安な価格設定で、業界全体の価格引き下げ競争が加速する見通しだ。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">政府審査が前提に</p>
  <p style="text-indent:1em;">トランプ政権の<span style="color:#b0001e;font-weight:700;">6月2日</span>大統領令を受け、フロンティアモデルの一般公開には連邦政府の事前審査と承認が義務付けられた。Solの初期アクセスは政府が審査した<span style="color:#b0001e;font-weight:700;">約20</span>の認定パートナー組織に限定されており、段階的な一般公開は<span style="color:#b0001e;font-weight:700;">7月中</span>が目標とされている。</p>
</div>
</foreignObject>
