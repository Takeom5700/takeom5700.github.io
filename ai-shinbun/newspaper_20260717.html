<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="1262" y="13">世界的なAIの祭典が開幕</text>
<line x1="1260" y1="17" x2="1800" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1756" y="24" clip-path="url(#cm)">上海WAICで</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1716" y="24" clip-path="url(#cm)">AI新時代を展望</text>
<foreignObject x="1260" y="22" width="448" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:448px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;margin:0 0 2px;">本日<span style="color:#b0001e;font-weight:700;">7月17日</span>、世界最大のAIイベント「<span style="color:#0d3461;font-weight:700;">世界人工知能会議</span>（<span style="color:#0d3461;font-weight:700;">WAIC</span>）<span style="color:#b0001e;font-weight:700;">2026</span>」が<span style="color:#0d3461;font-weight:700;">上海</span>で開幕した。<span style="color:#0d3461;font-weight:700;">習近平</span>国家主席が基調演説を行うなど、国際的な注目を集めている。今年のテーマは「<span style="color:#0d3461;font-weight:700;">AI Partnership for a Brighter Future</span>」であり、技術革新、実社会への応用、包摂的なエコシステムの育成に焦点が当てられる。また、<span style="color:#0d3461;font-weight:700;">Google</span>は同日に生成AIモデル「<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Pro</span>」の公開を予定しており、<span style="color:#b0001e;font-weight:700;">AI</span>業界にとって「<span style="color:#b0001e;font-weight:700;">AI</span>最大の一日」となる見込みだ。<span style="color:#0d3461;font-weight:700;">WAIC</span>では<span style="color:#b0001e;font-weight:700;">1,100</span>を超える企業が参加し、<span style="color:#b0001e;font-weight:700;">3,000</span>以上の展示が行われる予定である。企業<span style="color:#0d3461;font-weight:700;">AI</span>導入の次の段階として、モデル能力から信頼性の高い導入と測定可能な成果へのシフトが予測されている。</p><p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">期待される技術革新</p><p style="text-indent:1em;margin:0 0 2px;">この会議は、<span style="color:#0d3461;font-weight:700;">AI</span>が全ての産業を強化し、生産と日常生活に貢献する未来を描いている。<span style="color:#0d3461;font-weight:700;">AI</span>のガバナンスと人間による監視が製品アーキテクチャの一部となる重要性も指摘されており、公平で合理的、包摂的なグローバル<span style="color:#0d3461;font-weight:700;">AI</span>ガバナンスシステムの共同構築が提唱されている。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="938" y="13">国内技術の結集</text>
<line x1="936" y1="17" x2="1260" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1229" y="24" clip-path="url(#c2)">国産マルチモーダルAI</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1201" y="24" clip-path="url(#c2)">開発に本格始動</text>
<foreignObject x="936" y="22" width="257" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:257px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 7px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">ソニーグループ</span>、<span style="color:#0d3461;font-weight:700;">ソフトバンク</span>、<span style="color:#0d3461;font-weight:700;">日本電気</span>、<span style="color:#0d3461;font-weight:700;">本田技研工業</span>をはじめとする<span style="color:#b0001e;font-weight:700;">44社</span>が出資する<span style="color:#0d3461;font-weight:700;">Noetra株式会社</span>が、国産マルチモーダル基盤モデルの研究開発を本格的に開始した。<span style="color:#0d3461;font-weight:700;">Noetra</span>は<span style="color:#b0001e;font-weight:700;">2026</span>年度より推論基盤モデルを構築し、<span style="color:#b0001e;font-weight:700;">2028</span>年度には言語・画像・動画・音声を統合処理できるオムニモーダル基盤モデルの開発を目指す。最終的には<span style="color:#b0001e;font-weight:700;">2030</span>年度までに「実世界ネイティブ<span style="color:#0d3461;font-weight:700;">AI</span>」の実現に取り組む計画だ。開発を加速させるため、<span style="color:#0d3461;font-weight:700;">NVIDIA</span>の協力のもと、<span style="color:#0d3461;font-weight:700;">NVIDIA Rubin GPU</span>約<span style="color:#b0001e;font-weight:700;">2万7,500</span>基を搭載した<span style="color:#0d3461;font-weight:700;">AI</span>計算基盤を<span style="color:#b0001e;font-weight:700;">2027年4月</span>に構築開始し、<span style="color:#b0001e;font-weight:700;">2028年6月</span>から稼働させる予定である。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#111" font-weight="700" x="686" y="13">半導体供給網強化</text>
<line x1="684" y1="17" x2="936" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="910" y="24" clip-path="url(#c3)">TSMC、AI需要に対応</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="888" y="24" clip-path="url(#c3)">巨額投資を拡大</text>
<foreignObject x="684" y="22" width="196" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:196px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;">
世界最大の受託チップメーカーである<span style="color:#0d3461;font-weight:700;">台湾積体電路製造</span>（<span style="color:#0d3461;font-weight:700;">TSMC</span>）は、急増する<span style="color:#0d3461;font-weight:700;">AI</span>アプリケーションの需要に対応するため、今年の設備投資額を<span style="color:#b0001e;font-weight:700;">640億ドル</span>（約<span style="color:#b0001e;font-weight:700;">10兆円</span>）以上に引き上げた。さらに<span style="color:#b0001e;font-weight:700;">1,000億ドル</span>（約<span style="color:#b0001e;font-weight:700;">15兆円</span>）を米国に投資し、<span style="color:#b0001e;font-weight:700;">2nm</span>以降の先端技術を用いた<span style="color:#b0001e;font-weight:700;">4</span>つの新しいウエハー製造施設を建設する計画だ。これにより、<span style="color:#0d3461;font-weight:700;">TSMC</span>の米国への総投資額は<span style="color:#b0001e;font-weight:700;">2,650億ドル</span>（約<span style="color:#b0001e;font-weight:700;">41兆円</span>）に達する見込みである。これは<span style="color:#0d3461;font-weight:700;">AI</span>技術の発展を支える上で不可欠な半導体供給網の強化を意味している。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8" fill="#111" font-weight="700" x="488" y="13">新たな関係構築</text>
<line x1="486" y1="17" x2="684" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="661" y="24" clip-path="url(#c4)">OpenAI、米政府に</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="642" y="24" clip-path="url(#c4)">株式5%を提供提案</text>
<foreignObject x="486" y="22" width="148" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:148px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">OpenAI</span>が、米国政府に対し、非営利組織としてのガバナンスを維持しつつ、株式の<span style="color:#b0001e;font-weight:700;">5%</span>を提供すると提案した。この提案は<span style="color:#b0001e;font-weight:700;">426億ドル</span>（約<span style="color:#b0001e;font-weight:700;">6兆6千億円</span>）相当とされており、<span style="color:#0d3461;font-weight:700;">AI</span>の安全性と透明性に関する懸念が高まる中、政府との連携を深める意図がある。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="11">コンピュート制約</text>
<line x1="324" y1="15" x2="486" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="19" clip-path="url(#cr1)">Google、MetaのGemini利用制限</text>
<foreignObject x="324" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">Google</span>は計算資源の不足により、<span style="color:#0d3461;font-weight:700;">Meta</span>による<span style="color:#0d3461;font-weight:700;">Gemini</span>の利用を制限している。<span style="color:#0d3461;font-weight:700;">AI</span>開発競争において、計算資源が最大の制約となっている現状が浮き彫りになった。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="276">IPO準備加速</text>
<line x1="324" y1="280" x2="486" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="284" clip-path="url(#cr2)">Anthropic、Samsungと協業</text>
<foreignObject x="324" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">Anthropic</span>は、<span style="color:#b0001e;font-weight:700;">10月</span>の<span style="color:#0d3461;font-weight:700;">IPO</span>に向けて、カスタムチップ開発で<span style="color:#0d3461;font-weight:700;">Samsung</span>と協議を進めている。これにより、競争力強化とコスト削減を図る狙いだ。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="11">最新モデル展開</text>
<line x1="162" y1="15" x2="324" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="19" clip-path="url(#cm1)">OpenAI「GPT-5.6」提供開始</text>
<foreignObject x="162" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">OpenAI</span>は最新の<span style="color:#0d3461;font-weight:700;">AI</span>モデル「<span style="color:#0d3461;font-weight:700;">GPT-5.6</span>」の一般提供を開始した。これに先立ち、<span style="color:#b0001e;font-weight:700;">7月8日</span>には<span style="color:#0d3461;font-weight:700;">Luna</span>、<span style="color:#0d3461;font-weight:700;">Sol</span>、<span style="color:#0d3461;font-weight:700;">Terra</span>バージョンがリリースされている。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="276">物理AI連携</text>
<line x1="162" y1="280" x2="324" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="284" clip-path="url(#cm2)">日本のロボット大手、NVIDIAと</text>
<foreignObject x="162" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">富士通</span>、<span style="color:#0d3461;font-weight:700;">FANUC</span>、<span style="color:#0d3461;font-weight:700;">川崎重工業</span>、<span style="color:#0d3461;font-weight:700;">安川電機</span>は、<span style="color:#0d3461;font-weight:700;">NVIDIA</span>との協業により、物理<span style="color:#0d3461;font-weight:700;">AI</span>の導入を加速させる。これにより中国との競争優位を保つ。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="11">科学研究の推進</text>
<line x1="0" y1="15" x2="162" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="19" clip-path="url(#cl1)">カリフォルニア、AI科学に巨額投資</text>
<foreignObject x="0" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">カリフォルニア大学</span>と国立研究所が主催した「<span style="color:#0d3461;font-weight:700;">AI Science at Scale</span>」サミットで、<span style="color:#b0001e;font-weight:700;">1,900万ドル</span>の投資が発表された。科学的発見における<span style="color:#0d3461;font-weight:700;">AI</span>の役割が拡大している。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="276">企業AIの未来</text>
