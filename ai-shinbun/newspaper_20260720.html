<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="1262" y="13">EU規制、GoogleのAI優位を揺るがす</text>
<line x1="1260" y1="17" x2="1800" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1756" y="24" clip-path="url(#cm)">Google、AI競争</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1716" y="24" clip-path="url(#cm)">激化で新局面に</text>
<foreignObject x="1260" y="22" width="448" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:448px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;margin:0 0 2px;">欧州委員会は、<span style="color:#0d3461;font-weight:700;">Google</span>に対し、<span style="color:#0d3461;font-weight:700;">Android</span>を競合する<span style="color:#0d3461;font-weight:700;">AI</span>アシスタントに開放し、検索データを<span style="color:#0d3461;font-weight:700;">AI</span>開発者と共有するよう命じた。この決定は、<span style="color:#b0001e;font-weight:700;">20</span>億台のスマートフォンへのアクセスを再定義し、<span style="color:#0d3461;font-weight:700;">Google</span>の優位性、すなわちデフォルト配置と<span style="color:#b0001e;font-weight:700;">20</span>年間の検索行動データという<span style="color:#b0001e;font-weight:700;">2</span>つの資産を攻撃するものだ。今回の規制措置は、<span style="color:#0d3461;font-weight:700;">AI</span>分野で今年最も重大なものとなる。<span style="color:#0d3461;font-weight:700;">Google</span>は、<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Pro</span>が<span style="color:#b0001e;font-weight:700;">3</span>度目の目標未達と報じられるなど、苦戦が続く。</p><p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">データ共有が競争を促進</p><p style="text-indent:1em;margin:0 0 2px;">
<span style="color:#0d3461;font-weight:700;">Android</span>での競合アシスタントによる音声起動とアプリ間連携の許可は、<span style="color:#0d3461;font-weight:700;">Gemini</span>が享受してきた構造的優位性を排除する。また、匿名化された検索データの提供は、<span style="color:#0d3461;font-weight:700;">AI</span>開発者にこれまで入手できなかった訓練およびランキングシグナルを与える。検索データ共有は<span style="color:#b0001e;font-weight:700;">2027年1月</span>に、<span style="color:#0d3461;font-weight:700;">Android</span>の相互運用性は<span style="color:#b0001e;font-weight:700;">2027年7月</span>までに実施予定だ。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="938" y="13">生物学的脅威にAIで対抗</text>
<line x1="936" y1="17" x2="1260" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1229" y="24" clip-path="url(#c2)">Google DeepMind</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1201" y="24" clip-path="url(#c2)">「バイオレジリエンス」</text>
<foreignObject x="936" y="22" width="257" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:257px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 7px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Google DeepMind</span>と<span style="color:#0d3461;font-weight:700;">Isomorphic Labs</span>は、<span style="color:#b0001e;font-weight:700;">7月16日</span>に<span style="color:#0d3461;font-weight:700;">AI</span>を活用した「バイオレジリエンス」構想を発表した。これは生物学的脅威に対し、予防、検知、対応の<span style="color:#b0001e;font-weight:700;">3</span>つの領域で共同アプローチをとるものだ。過去<span style="color:#b0001e;font-weight:700;">12</span>カ月間で政府機関や研究組織と<span style="color:#b0001e;font-weight:700;">15</span>件以上の提携を結んだという。<span style="color:#0d3461;font-weight:700;">Gemini</span>モデルへの脅威モデリング導入、<span style="color:#0d3461;font-weight:700;">SynthID</span>の生物学データ応用、<span style="color:#0d3461;font-weight:700;">AlphaEvolve</span>による病原体サーベイランス最適化、<span style="color:#0d3461;font-weight:700;">AlphaFold</span>によるワクチン開発加速が具体策に含まれる。<span style="color:#0d3461;font-weight:700;">Isomorphic Labs</span>は創薬エンジン<span style="color:#0d3461;font-weight:700;">IsoDDE</span>を迅速展開する専門ユニットを設立した。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#111" font-weight="700" x="686" y="13">中小企業のAI利用、ポリシー不在が課題</text>
<line x1="684" y1="17" x2="936" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="910" y="24" clip-path="url(#c3)">AI利用と</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="888" y="24" clip-path="url(#c3)">「シャドウAI」</text>
<foreignObject x="684" y="22" width="196" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:196px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;">中小企業の<span style="color:#0d3461;font-weight:700;">AI</span>導入が急速に進んでおり、<span style="color:#b0001e;font-weight:700;">77%</span>が日常的に利用しているものの、ほとんどが正式な<span style="color:#0d3461;font-weight:700;">AI</span>ポリシーなしで運用されている。この場当たり的な統合は「シャドウ<span style="color:#0d3461;font-weight:700;">AI</span>」を生み出し、データ漏洩やブランドの一貫性欠如、未承認ツールの使用といったリスクにつながる。特に、<span style="color:#0d3461;font-weight:700;">EU AI Act</span>や米国の州法といった新たな規制により、透明性やコンテンツ表示が義務付けられ、ポリシー策定の緊急性が高まっている。簡潔な<span style="color:#b0001e;font-weight:700;">1</span>ページ<span style="color:#0d3461;font-weight:700;">AI</span>ポリシーが推奨される。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8" fill="#111" font-weight="700" x="488" y="13">エージェンティック・コマースがUIを再定義</text>
<line x1="486" y1="17" x2="684" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="661" y="24" clip-path="url(#c4)">AIエージェント</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="642" y="24" clip-path="url(#c4)">経済自動化へ</text>
<foreignObject x="486" y="22" width="148" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:148px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;">テクノロジー業界は「生成<span style="color:#0d3461;font-weight:700;">AI</span>の社会実装」から「エージェントによる経済活動の自動化（エージェンティック・コマース）」へと劇的にシフトしている。<span style="color:#0d3461;font-weight:700;">AI</span>エージェントが、単なる対話相手ではなく、購買や開発、創作を自律的に代行する「実行層」へと到達。これにより<span style="color:#0d3461;font-weight:700;">GUI</span>を経由しない購買代行などが現実のものとなった。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="11">Google</text>
<line x1="324" y1="15" x2="486" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="19" clip-path="url(#cr1)">Gemini 3.5Pro目標未達</text>
<foreignObject x="324" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Google</span>の<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Pro</span>が<span style="color:#b0001e;font-weight:700;">3</span>度目の目標未達と報じられた。これは<span style="color:#0d3461;font-weight:700;">Google</span>にとって厳しい局面を象徴する。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="276">Oracle</text>
<line x1="324" y1="280" x2="486" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="284" clip-path="url(#cr2)">Stargate資金のため人員削減</text>
<foreignObject x="324" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Oracle</span>は<span style="color:#b0001e;font-weight:700;">5000億ドル</span>の<span style="color:#0d3461;font-weight:700;">Stargate</span>プロジェクト資金のため、最大<span style="color:#b0001e;font-weight:700;">3</span>万人の人員削減を行うと報じられた。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="11">SAP</text>
<line x1="162" y1="15" x2="324" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="19" clip-path="url(#cm1)">チャットボット以外に投資</text>
<foreignObject x="162" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">SAP</span>は<span style="color:#b0001e;font-weight:700;">10億ユーロ</span>以上を投じ、チャットボット以外の<span style="color:#0d3461;font-weight:700;">AI</span>に賭ける欧州のフロンティア研究所を支援する。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="276">NVIDIA</text>
<line x1="162" y1="280" x2="324" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="284" clip-path="url(#cm2)">AIインフラ加速</text>
<foreignObject x="162" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">NVIDIA</span>を軸に<span style="color:#0d3461;font-weight:700;">AI</span>インフラのスケールと効率化が加速。特に<span style="color:#0d3461;font-weight:700;">Blackwell/GB300</span>の量産とクラウド実装が進む。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="11">Google検索</text>
<line x1="0" y1="15" x2="162" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="19" clip-path="url(#cl1)">無料AI画像生成</text>
<foreignObject x="0" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Google</span>検索から無料で<span style="color:#0d3461;font-weight:700;">AI</span>画像生成が可能になり、<span style="color:#0d3461;font-weight:700;">Seedance 2.5</span>も解禁された。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="276">LLM競争</text>
<line x1="0" y1="280" x2="162" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="284" clip-path="url(#cl2)">AppleがOpenAI訴訟</text>
<foreignObject x="0" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Apple</span>が<span style="color:#0d3461;font-weight:700;">OpenAI</span>を訴訟、新しい<span style="color:#0d3461;font-weight:700;">Siri</span>が<span style="color:#0d3461;font-weight:700;">Gemini</span>に切り替わるなど、<span style="color:#0d3461;font-weight:700;">LLM</span>を巡る動きが注目。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="1202" y="543">AIコンテンツの質と量</text>
<line x1="1200" y1="547" x2="1800" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1770" y="552" clip-path="url(#cda)">AI創作プラットフォーム進化</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1748" y="552" clip-path="url(#cda)">「AIスロップ」対策が急務</text>
<foreignObject x="1200" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Google Vids</span>と<span style="color:#0d3461;font-weight:700;">Roblox</span>の「<span style="color:#0d3461;font-weight:700;">Build</span>」機能導入により、創作の敷居が大きく下がった。<span style="color:#0d3461;font-weight:700;">Google Vids</span>は、セルフィーと音声データから本人のデジタルアバターを作成する機能を搭載し、動画制作のオールインワン・プラットフォームへと進化。一方、<span style="color:#0d3461;font-weight:700;">Roblox</span>はモバイルアプリ上でテキストプロンプトからゲームを生成する機能を公開した。しかし、これに伴い、低品質なコンテンツ、いわゆる「<span style="color:#0d3461;font-weight:700;">AI</span>スロップ」が市場に溢れる懸念も浮上している。<span style="color:#0d3461;font-weight:700;">Roblox</span>はこの問題に対し、プレイヤーの定着率に基づいて<span style="color:#0d3461;font-weight:700;">AI</span>生成ゲームをランク付けし、露出を制限するアルゴリズムを導入することで、品質維持を図る方針を示した。これは、創作の民主化と質の担保を両立させるための、プラットフォーム側の新しい倫理基準と言える。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="602" y="543">半導体市場の行方</text>
<line x1="600" y1="547" x2="1200" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1170" y="552" clip-path="url(#cdb)">AMD、AIイベントで</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1148" y="552" clip-path="url(#cdb)">新製品と競争力試す</text>
<foreignObject x="600" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Advanced Micro Devices (<span style="color:#0d3461;font-weight:700;">AMD</span>)</span>は、<span style="color:#b0001e;font-weight:700;">7月22日～23日</span>に開催される「<span style="color:#0d3461;font-weight:700;">Advancing AI 2026</span>」イベントで、新しい<span style="color:#0d3461;font-weight:700;">AI</span>アクセラレーター製品、<span style="color:#0d3461;font-weight:700;">HBM</span>調達、データセンター市場での競争力を試される。もし内容が期待外れであれば、<span style="color:#0d3461;font-weight:700;">AI</span>半導体株の調整が長引く可能性があり、逆に需要と収益性の改善が確認されれば、反発のきっかけとなるだろう。<span style="color:#0d3461;font-weight:700;">AI</span>投資の広範な影響として、電力インフラや通信インフラへの波及効果も重要視されている。<span style="color:#0d3461;font-weight:700;">TSMC</span>や<span style="color:#0d3461;font-weight:700;">ASML</span>の好決算にもかかわらず、「セル・ザ・ニュース」反応が見られた市場の動きも考慮される。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="2" y="543">AIの進化と企業導入</text>
<line x1="0" y1="547" x2="600" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="570" y="552" clip-path="url(#cdc)">マルチモーダルAI強化</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="548" y="552" clip-path="url(#cdc)">エンタープライズに普及</text>
<foreignObject x="0" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;"><span style="color:#b0001e;font-weight:700;">2026年7月</span>に向けて、主要な<span style="color:#0d3461;font-weight:700;">AI</span>企業は、テキスト、画像、音声、動画を同時に理解できるマルチモーダル<span style="color:#0d3461;font-weight:700;">AI</span>モデルの改善を継続すると予想されている。将来のモデルは、より優れた推論、迅速な応答、長い記憶、強化された視覚理解、そしてより自然な会話を提供すると見込まれる。また、エンタープライズ<span style="color:#0d3461;font-weight:700;">AI</span>は、金融、ヘルスケア、小売、製造、物流など、幅広い業界で標準化されつつある。<span style="color:#b0001e;font-weight:700;">7月</span>には、<span style="color:#0d3461;font-weight:700;">AI</span>を活用した顧客サポート、インテリジェントなワークフロー自動化、<span style="color:#0d3461;font-weight:700;">AI</span>意思決定アシスタントなどに関する発表が予想される。</p></div></foreignObject>
