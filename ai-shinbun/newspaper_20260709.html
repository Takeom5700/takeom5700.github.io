<foreignObject x="1260" y="22" width="448" height="508">

            font-size:14px;line-height:1.85;text-align:justify;
            padding:0 8px;color:#111;">
  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">Anthropic</span>は<span style="color:#b0001e;font-weight:700;">2026年7月1日</span>、中位価格帯の最新モデル「<span style="color:#0d3461;font-weight:700;">Claude Sonnet 5</span>」を正式公開した。開発コードネーム「フェネック」と呼ばれる同モデルは、エージェント型AIとして設計されており、ブラウザやターミナルなどのツールを自律的に操作する能力が大幅に強化されている。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">性能と価格の両立</p>
  <p style="text-indent:1em;margin:0 0 2px;">エージェントコーディング性能は<span style="color:#b0001e;font-weight:700;">63.2%</span>を記録し、上位モデル<span style="color:#0d3461;font-weight:700;">Opus 4.8</span>の<span style="color:#b0001e;font-weight:700;">69.2%</span>に迫る水準を低コストで実現した。コンテキストウィンドウは<span style="color:#b0001e;font-weight:700;">100万トークン</span>、最大出力は<span style="color:#b0001e;font-weight:700;">12.8万トークン</span>に対応する。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">全プランで即日利用可能</p>
  <p style="text-indent:1em;">料金は導入期間（<span style="color:#b0001e;font-weight:700;">8月31日</span>まで）として入力<span style="color:#b0001e;font-weight:700;">2ドル</span>／出力<span style="color:#b0001e;font-weight:700;">10ドル</span>（百万トークン単位）。無料プランを含む全プランでデフォルトモデルとして提供され、あわせて科学者向け支援ツール「<span style="color:#0d3461;font-weight:700;">Claude Science</span>」も発表された。</p>
</div>
