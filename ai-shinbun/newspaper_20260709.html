<!-- 主記事 -->
<text font-family="'Noto Sans JP',sans-serif" font-size="9" fill="#111" font-weight="700" x="1262" y="13">【独占】OpenAI・SpaceXAIが同日フロンティアモデル公開　AI史上初の競合同時展開</text>
<line x1="1260" y1="17" x2="1800" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP','Yu Mincho',serif" font-weight="900" font-size="36" writing-mode="tb-rl" x="1756" y="24" clip-path="url(#c-main)">GPT&#x2011;5.6三段</text>
<text font-family="'Noto Serif JP','Yu Mincho',serif" font-weight="900" font-size="36" writing-mode="tb-rl" x="1716" y="24" clip-path="url(#c-main)">展開で価格戦へ</text>
<foreignObject x="1260" y="22" width="448" height="508">
<div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:448px;overflow:hidden;font-family:'Noto Serif JP','Yu Mincho',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;">
  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">OpenAI</span>は<span style="color:#b0001e;font-weight:700;">7月9日</span>、最新フロンティアモデル「<span style="color:#0d3461;font-weight:700;">GPT-5.6</span>」を三段階で同時展開した。最高性能の「<span style="color:#0d3461;font-weight:700;">Sol</span>」は百万トークンあたり<span style="color:#b0001e;font-weight:700;">5ドル／30ドル</span>で提供され、独立ベンチマークで<span style="color:#b0001e;font-weight:700;">91.9%</span>を記録した。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">三層価格戦略の全容</p>
  <p style="text-indent:1em;margin:0 0 2px;">汎用向け「<span style="color:#0d3461;font-weight:700;">Terra</span>」は<span style="color:#b0001e;font-weight:700;">2.5ドル／15ドル</span>、軽量の「<span style="color:#0d3461;font-weight:700;">Luna</span>」は<span style="color:#b0001e;font-weight:700;">1ドル／6ドル</span>と幅広い価格帯を実現。開発者は<span style="color:#b0001e;font-weight:700;">0.44ドル</span>から<span style="color:#b0001e;font-weight:700;">50ドル超</span>まで多様な選択が可能となった。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">競合も同日参戦</p>
  <p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">SpaceXAI</span>は同日「<span style="color:#0d3461;font-weight:700;">Grok 4.5</span>」を電撃公開した。複数フロンティアモデルが同日一般公開された日はAI史上初であり、業界の競争激化を象徴する出来事となった。<span style="color:#0d3461;font-weight:700;">米政府</span>による<span style="color:#b0001e;font-weight:700;">30日間</span>の安全審査を経て公開された点も注目される。</p>
</div>
</foreignObject>

<!-- 第2記事 -->

<text font-family="'Noto Serif JP','Yu Mincho',serif" font-weight="900" font-size="24" writing-mode="tb-rl" x="1201" y="24" clip-path="url(#c-2nd)">三強時代の幕開け</text>
<foreignObject x="936" y="22" width="257" height="508">
<div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:257px;overflow:hidden;font-family:'Noto Serif JP','Yu Mincho',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 7px;color:#111;">
  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">SpaceXAI</span>と<span style="color:#0d3461;font-weight:700;">Cursor</span>が共同開発した「<span style="color:#0d3461;font-weight:700;">Grok 4.5</span>」が<span style="color:#b0001e;font-weight:700;">7月9日</span>に公開された。<span style="color:#0d3461;font-weight:700;">イーロン・マスク</span>氏は「より高速でトークン効率的、低コスト」と述べ、<span style="color:#0d3461;font-weight:700;">Claude Opus</span>級の知性を備えると主張した。</p>
  <p style="text-indent:1em;">独立ベンチマークデータはまだ公開されていないが、コーディング性能と自律エージェント機能において<span style="color:#0d3461;font-weight:700;">Anthropic</span>や<span style="color:#0d3461;font-weight:700;">OpenAI</span>と真っ向から競合する。市場はこれを「<span style="color:#b0001e;font-weight:700;">三強時代</span>」の幕開けと受け止めている。</p>
</div>
</foreignObject>

  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">Google</span>の「<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Pro</span>」は<span style="color:#b0001e;font-weight:700;">6月</span>の発表期限を逃し、依然として限定プレビュー段階にある。</p>
  <p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">OpenAI</span>と<span style="color:#0d3461;font-weight:700;">SpaceXAI</span>が同日に新モデルを公開した<span style="color:#b0001e;font-weight:700;">7月9日</span>、<span style="color:#0d3461;font-weight:700;">Google</span>の相対的立場は一段と低下した。<span style="color:#0d3461;font-weight:700;">DeepMind</span>は安全研究基金<span style="color:#b0001e;font-weight:700;">1000万ドル</span>を設立し巻き返しを図る。</p>
