</text>

<text font-family="'Noto Serif JP','Yu Mincho',serif"
      font-weight="900" font-size="36"
      writing-mode="tb-rl" x="1716" y="24"
      clip-path="url(#c-main)">難問五十年制覇</text>

<foreignObject x="1260" y="22" width="448" height="508">
<div xmlns="http://www.w3.org/1999/xhtml"
     style="writing-mode:vertical-rl;height:508px;width:448px;overflow:hidden;
            font-family:'Noto Serif JP','Yu Mincho',serif;
            font-size:14px;line-height:1.85;text-align:justify;
            padding:0 8px;color:#111;">
  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">オープンAI</span>は<span style="color:#b0001e;font-weight:700;">7月9日</span>、大型言語モデル群「<span style="color:#0d3461;font-weight:700;">GPT-5.6</span>」ファミリーを正式公開した。旗艦モデル「<span style="color:#b0001e;font-weight:700;">Sol</span>」、汎用モデル「Terra」、廉価版「Luna」の<span style="color:#b0001e;font-weight:700;">三体制</span>で展開し、米政府との<span style="color:#b0001e;font-weight:700;">30日間</span>の事前審査を経て承認を受けた。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">数学難問を1時間で証明</p>
  <p style="text-indent:1em;margin:0 0 2px;">特に注目されるのは旗艦モデル「<span style="color:#b0001e;font-weight:700;">Sol Ultra</span>」の性能だ。グラフ理論の未解決問題「<span style="color:#0d3461;font-weight:700;">サイクル二重被覆予想</span>」を、<span style="color:#b0001e;font-weight:700;">64</span>のサブエージェントを並列稼働させて<span style="color:#b0001e;font-weight:700;">1時間以内</span>に証明した。この難問は<span style="color:#b0001e;font-weight:700;">50年以上</span>にわたり未解決であり、世界の数学者を驚愕させた。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">政府審査を経た新モデル体制</p>
  <p style="text-indent:1em;">米ホワイトハウスが求めたフロンティアモデルへの事前レビュー制度が初めて適用され、<span style="color:#0d3461;font-weight:700;">OpenAI</span>はその枠組みに従った最初の企業となった。AIと国家安全保障の緊張関係が続く中、業界標準となる可能性がある。</p>
</div>
</foreignObject>

  <p style="text-indent:1em;margin:0 0 2px;">同社は併せて「<span style="color:#b0001e;font-weight:700;">Claude Corps</span>」を発表。非営利組織向けに<span style="color:#b0001e;font-weight:700;">12か月</span>間の有料フェローシップとして、AI人材育成プログラムを提供する。</p>
