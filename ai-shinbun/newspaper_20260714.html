<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="1262" y="13">サイバーセキュリティ新時代</text>
<line x1="1260" y1="17" x2="1800" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1756" y="24" clip-path="url(#cm)">AI悪用詐欺急増</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1716" y="24" clip-path="url(#cm)">Rekenが防御の新基盤</text>
<foreignObject x="1260" y="22" width="448" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:448px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;margin:0 0 2px;">AIの進化がオンライン上の信頼を根底から揺るがす中、サイバーセキュリティ企業<span style="color:#0d3461;font-weight:700;">Reken</span>は<span style="color:#b0001e;font-weight:700;">7月13日</span>、デバイス内AIセキュリティソフトウェアプラットフォームを発表し、ステルスモードから脱却した。同社は、AIを利用した詐欺、不正行為、ディープフェイクの蔓延に対処し、インターネットを人間にとって安全な場所に戻すことを目指す。近年の調査では、オンラインメッセージの<span style="color:#b0001e;font-weight:700;">83%</span>が詐欺であると疑われるほど、人々の不信感が拡大している現状が浮き彫りになった。<span style="color:#0d3461;font-weight:700;">FBI</span>の報告によると、<span style="color:#b0001e;font-weight:700;">2025年</span>のサイバー犯罪による損失は<span style="color:#b0001e;font-weight:700;">209億ドル</span>に達し、<span style="color:#b0001e;font-weight:700;">26%</span>増加。AI犯罪が初めて独立したカテゴリとして追加され、<span style="color:#b0001e;font-weight:700;">2万2千件</span>以上の関連苦情が寄せられたという。</p><p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">新たな防御戦略</p><p style="text-indent:1em;margin:0 0 2px;">従来のセキュリティ対策では、これらの問題解決に限界があった。<span style="color:#0d3461;font-weight:700;">Reken</span>が提供する「<span style="color:#0d3461;font-weight:700;">Rekenプライベートコア</span>」は、デバイス間の通信を保護する画期的なAIセキュリティシステムだ。同社CEOの<span style="color:#0d3461;font-weight:700;">シューマン・ゴーゼマジューダー</span>氏は、「人間には見えない脅威を検知するジャストインタイムAIが必要だ」と述べた。この新技術は、企業が従業員を「法医学的なデジタル捜査官」にする必要をなくし、セキュリティトレーニングに費やす莫大なコストと時間を削減すると期待されている。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="938" y="13">主要LLMの動向</text>
<line x1="936" y1="17" x2="1260" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1229" y="24" clip-path="url(#c2)">OpenAIが対話AI</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1201" y="24" clip-path="url(#c2)">GPT-Liveを発表</text>
<foreignObject x="936" y="22" width="257" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:257px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 7px;color:#111;"><p style="text-indent:1em;">　<span style="color:#0d3461;font-weight:700;">OpenAI</span>は今週、リアルタイムで聞き、話し、推論する双方向音声AI「<span style="color:#0d3461;font-weight:700;">GPT-Live</span>」を発表した。これにより、Siri以来の「トランシーバーのような間」がなくなり、ライブ翻訳や会話中のウェブ検索、タスク委任が自然な対話で可能になる。 さらに同社は「<span style="color:#0d3461;font-weight:700;">GPT-5.6</span>」ファミリー（<span style="color:#0d3461;font-weight:700;">Sol</span>、<span style="color:#0d3461;font-weight:700;">Terra</span>、<span style="color:#0d3461;font-weight:700;">Luna</span>）もリリースし、AIモデルの能力競争は激化している。<span style="color:#0d3461;font-weight:700;">Anthropic</span>の「<span style="color:#0d3461;font-weight:700;">Claude Opus 4.8</span>」はコーディングと長文精度で優位に立ち、<span style="color:#0d3461;font-weight:700;">Google</span>は「<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Pro</span>」のリリースを控える。各社が差別化を図りつつ、機能面での差は縮まっているという。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#111" font-weight="700" x="686" y="13">国産AI開発加速</text>
<line x1="684" y1="17" x2="936" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="910" y="24" clip-path="url(#c3)">日本、AI主権へ</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="888" y="24" clip-path="url(#c3)">「源内」で実証開始</text>
<foreignObject x="684" y="22" width="196" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:196px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;">　<span style="color:#0d3461;font-weight:700;">日本</span>の<span style="color:#0d3461;font-weight:700;">人工知能戦略本部</span>は<span style="color:#b0001e;font-weight:700;">7月10日</span>、「<span style="color:#0d3461;font-weight:700;">第2期AI基本計画</span>」とバーティカルAI領域別戦略について議論した。 同日、<span style="color:#0d3461;font-weight:700;">デジタル庁</span>は政府職員向けAI基盤「<span style="color:#0d3461;font-weight:700;">源内</span>」の実証実験で、国産AIモデルを「<span style="color:#0d3461;font-weight:700;">さくらのクラウド</span>」上で稼働させると発表。 これは日本のAIにおける自律性確保が主目的で、特定の海外プラットフォームへの依存を減らす狙いがある。<span style="color:#0d3461;font-weight:700;">NTTデータ</span>の<span style="color:#0d3461;font-weight:700;">tsuzumi 2</span>、<span style="color:#0d3461;font-weight:700;">富士通</span>の<span style="color:#0d3461;font-weight:700;">Takane 32B</span>、<span style="color:#0d3461;font-weight:700;">Preferred Networks</span>の<span style="color:#0d3461;font-weight:700;">PLaMo 2.0 Prime</span>の<span style="color:#b0001e;font-weight:700;">3種類</span>が稼働する。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8" fill="#111" font-weight="700" x="488" y="13">AI開発トレンド</text>
<line x1="486" y1="17" x2="684" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="661" y="24" clip-path="url(#c4)">巨大モデルから</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="642" y="24" clip-path="url(#c4)">効率化へ</text>
<foreignObject x="486" y="22" width="148" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:148px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;">　AI業界は、より大きく、より高価なモデルの構築から、よりスマートで費用対効果の高いシステムへの転換期を迎えている。開発者は、特定の領域に特化した、実行コストが大幅に低い推論最適化モデルに注力。数年前の巨大モデルに比べ、数分の<span style="color:#b0001e;font-weight:700;">1</span>のコストで運用できるAIシステムが重視されている。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="11">半導体</text>
<line x1="324" y1="15" x2="486" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="19" clip-path="url(#cr1)">NVIDIA新チップ量産</text>
<foreignObject x="324" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">　<span style="color:#0d3461;font-weight:700;">NVIDIA</span>の<span style="color:#0d3461;font-weight:700;">Blackwell</span>/<span style="color:#0d3461;font-weight:700;">GB300</span>の量産とクラウド実装が加速し、数万から<span style="color:#b0001e;font-weight:700;">17万</span>GPU計画の「AIファクトリー」拡大を後押し。 企業へのAI導入が促進されている。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="276">AI人材</text>
<line x1="324" y1="280" x2="486" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="284" clip-path="url(#cr2)">Anthropic訓練開始</text>
<foreignObject x="324" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">　<span style="color:#0d3461;font-weight:700;">Anthropic</span>は、非営利団体で将来のAI専門家を育成する<span style="color:#b0001e;font-weight:700;">12ヶ月</span>間の有償研修プログラム「<span style="color:#0d3461;font-weight:700;">Claude Corps</span>」を開始した。 AI人材育成に注力する動き。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="11">ブラウザAI</text>
<line x1="162" y1="15" x2="324" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="19" clip-path="url(#cm1)">GoogleがLiteRT.js</text>
<foreignObject x="162" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">　<span style="color:#0d3461;font-weight:700;">Google</span>は、ウェブブラウザにAIを直接組み込むための高速かつプライバシー重視のフレームワーク「<span style="color:#0d3461;font-weight:700;">LiteRT.js</span>」を発表した。 利用者へのAI体験を向上させる。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="276">画像生成</text>
<line x1="162" y1="280" x2="324" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="284" clip-path="url(#cm2)">Meta機能一時停止</text>
<foreignObject x="162" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">　<span style="color:#0d3461;font-weight:700;">Meta</span>は、<span style="color:#0d3461;font-weight:700;">Instagram</span>のAI画像生成機能に対し批判が相次いだため、一時停止した。 公開アカウントの画像を無断で使用した点が問題視された。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="11">ロボット</text>
<line x1="0" y1="15" x2="162" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="19" clip-path="url(#cl1)">中国で人型ロボ普及</text>
<foreignObject x="0" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">　<span style="color:#0d3461;font-weight:700;">中国</span>では、高齢者介護や教育目的で人型ロボットの家庭への導入が加速している。 政府も普及を積極的に後押ししているという。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="276">交通安全</text>
<line x1="0" y1="280" x2="162" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="284" clip-path="url(#cl2)">EUがAI義務化</text>
<foreignObject x="0" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">　<span style="color:#0d3461;font-weight:700;">EU</span>では、<span style="color:#b0001e;font-weight:700;">2026年7月7日</span>以降に登録される新車に、AI搭載のドライバー注意散漫検知システムの搭載が義務付けられた。 交通安全向上へ向けた一歩。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="1202" y="543">LLM競争の最前線</text>
<line x1="1200" y1="547" x2="1800" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1770" y="552" clip-path="url(#cda)">主要3社、特化戦略へ</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1748" y="552" clip-path="url(#cda)">覇権争い熾烈</text>
<foreignObject x="1200" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;">　<span style="color:#b0001e;font-weight:700;">2026年</span>半ばの現在、主要なLLMモデルの競争は新たな段階に入った。 <span style="color:#0d3461;font-weight:700;">OpenAI</span>、<span style="color:#0d3461;font-weight:700;">Anthropic</span>、<span style="color:#0d3461;font-weight:700;">Google</span>の<span style="color:#b0001e;font-weight:700;">3社</span>は、それぞれ「<span style="color:#0d3461;font-weight:700;">GPT-5.5</span>」（汎用性とエコシステム）、<span style="color:#0d3461;font-weight:700;">Claude Opus 4.8</span>（コーディングと長文精度）、<span style="color:#0d3461;font-weight:700;">Gemini 3.1 Pro</span>（<span style="color:#0d3461;font-weight:700;">Google Workspace</span>連携とリアルタイムウェブグラウンディング）といった強みを明確に打ち出し、価格も月額<span style="color:#b0001e;font-weight:700;">20ユーロ</span>前後で収斂している。 各モデル間の能力差は縮小しつつも、得意分野への特化が進み、ユースケースに合わせたモデル選択の重要性が増している。例えば、<span style="color:#0d3461;font-weight:700;">Claude Opus 4.7</span>はコーディングベンチマークで低ハルシネーション率を示し、大規模なコードベースのリファクタリングでは開発者から高い評価を得ている。 一方、<span style="color:#0d3461;font-weight:700;">GPT-5.5</span>は自律的なターミナルワークフローとツールシーケンスに優れ、<span style="color:#0d3461;font-weight:700;">Gemini CLI</span>は<span style="color:#0d3461;font-weight:700;">Google Cloud</span>エコシステム内での高速なデバッグに適応する。今後は、単純なモデル性能だけでなく、各プラットフォームが提供するエコシステムや連携性、そして実際の業務への適合度がモデル選定の決め手となるだろう。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="602" y="543">エージェントAIの新潮流</text>
<line x1="600" y1="547" x2="1200" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1170" y="552" clip-path="url(#cdb)">産業変革期へ、</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1148" y="552" clip-path="url(#cdb)">実用化が加速</text>
<foreignObject x="600" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;">　AI技術の進展は、産業界に大規模な変革をもたらし続けている。<span style="color:#0d3461;font-weight:700;">NVIDIA</span>の<span style="color:#0d3461;font-weight:700;">Blackwell</span>/<span style="color:#0d3461;font-weight:700;">GB300</span>の量産とクラウド実装により、AIインフラのスケールと効率化が加速。 これに伴い、エージェント前提のAI基盤とツールが一気に実運用フェーズへ移行している。例えば、<span style="color:#0d3461;font-weight:700;">Microsoft</span>の<span style="color:#0d3461;font-weight:700;">Project Solara</span>は<span style="color:#b0001e;font-weight:700;">6,000人体制</span>での導入支援を展開し、企業がAIを既存ワークフローに統合するのを支援。 <span style="color:#0d3461;font-weight:700;">Anthropic</span>の<span style="color:#0d3461;font-weight:700;">Claude Sonnet 5</span>や<span style="color:#0d3461;font-weight:700;">Claude Science</span>の登場は、計画やツール実行の自律性を高め、科学ワークフローの統合を進めている。 AIによる自動化は、業務効率を向上させる一方で、労働市場への影響も議論されている。 特に、インドのような巨大なアウトソーシング産業を持つ国では、AIの完全な潜在能力を制限する「ダークデータ」問題が浮上しており、AI導入前にデータ管理の重要性が再認識されている。 AIブームは富裕層の間で贅沢品消費を促進するなど、経済全体に波及効果を生み出しているが、その持続可能性には、倫理的課題や規制の枠組みの構築が不可欠となる。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="2" y="543">AI開発の課題</text>
<line x1="0" y1="547" x2="600" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="570" y="552" clip-path="url(#cdc)">データ品質が</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="548" y="552" clip-path="url(#cdc)">AI活用の鍵</text>
<foreignObject x="0" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;">　AIの導入が加速する一方で、その真の潜在能力を引き出す上での最大の障壁の一つがデータ品質の問題である。<span style="color:#0d3461;font-weight:700;">インド</span>では、長年のアウトソーシング産業が急速にデジタル化された結果、断片化されたデータ、膨大なデータリーク、レガシーフォーマット、未文書化のAPIといった「ダークデータ」が大量に存在。 これらは保管に多大なコストがかかるだけでなく、AIモデルを実質的に無力化させてしまう。企業がワークフローを自動化する前に、クリーンな情報が必要であり、「流砂の上にハイテクな大邸宅を建てることはできない」と専門家は指摘する。 適切なデータガバナンスがAI導入の前提条件となる。さもなければ、モデルに質の悪いデータを供給し、かえって企業の負債となるリスクがある。この課題を克服するため、AIをユーザーにより近づけ、レイテンシを削減し、プライバシーを保護する動きが強まっている。<span style="color:#0d3461;font-weight:700;">Google</span>がウェブブラウザ向けに発表した<span style="color:#0d3461;font-weight:700;">LiteRT.js</span>もその一環だ。 データ品質とプライバシー保護は、AIが社会に深く浸透するための喫緊の課題であり、技術開発だけでなく、制度設計と運用の見直しが不可欠となる。</p></div></foreignObject>
