<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="1262" y="13">フロンティアAI競争激化</text>
<line x1="1260" y1="17" x2="1800" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1756" y="24" clip-path="url(#cm)">GPT-5.6対Claude F5</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1716" y="24" clip-path="url(#cm)">Gemini 3.5 Proも参戦</text>
<foreignObject x="1260" y="22" width="448" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:448px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;margin:0 0 2px;">最先端<span style="color:#0d3461;font-weight:700;">AI</span>モデル開発競争が熱を帯びる中、<span style="color:#0d3461;font-weight:700;">OpenAI</span>の「<span style="color:#0d3461;font-weight:700;">GPT-5.6 Sol</span>」が一部ベンチマークで優位に立ち、<span style="color:#0d3461;font-weight:700;">Anthropic</span>の「<span style="color:#0d3461;font-weight:700;">Claude Fable 5</span>」と激しいトップ争いを繰り広げている。特に<span style="color:#0d3461;font-weight:700;">GPT-5.6 Sol</span>は、一部の集計されたコーディングエージェントベンチマークで「<span style="color:#0d3461;font-weight:700;">Fable 5</span>」を上回り、使用トークン量を<span style="color:#b0001e;font-weight:700;">半分以下</span>に抑えつつ、コストも約<span style="color:#b0001e;font-weight:700;">3分の1</span>削減しているという。 一方、<span style="color:#0d3461;font-weight:700;">Anthropic</span>は「<span style="color:#0d3461;font-weight:700;">Claude Fable 5</span>」の一時的な利用制限解除と、期待される「<span style="color:#0d3461;font-weight:700;">Claude 6</span>」の登場で対抗姿勢を示している。 さらに、<span style="color:#0d3461;font-weight:700;">Google</span>は「<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Pro</span>」を<span style="color:#b0001e;font-weight:700;">7月17日</span>に発表するとの憶測が広がる。 「<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Pro</span>」は「<span style="color:#0d3461;font-weight:700;">Deep Think</span>」推論モード、<span style="color:#b0001e;font-weight:700;">200万トークン</span>のコンテキストウィンドウ、および大幅に強化されたコーディング能力を特徴とすると報じられており、現在の<span style="color:#0d3461;font-weight:700;">AI</span>市場の勢力図を大きく塗り替える可能性を秘めている。 各社は、競争激化を背景に、両社とも一時的に自社の最新<span style="color:#0d3461;font-weight:700;">AI</span>モデルへの利用制限を緩和しており、ユーザーは高度な推論能力を体験する機会を得ている。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="938" y="13">教育AI、熾烈な市場争い</text>
<line x1="936" y1="17" x2="1260" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1229" y="24" clip-path="url(#c2)">Claude for Teachers登場</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1201" y="24" clip-path="url(#c2)">教師支援の未来は</text>
<foreignObject x="936" y="22" width="257" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:257px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 7px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Anthropic</span>が教育市場に本格参入し、「<span style="color:#0d3461;font-weight:700;">Claude for Teachers</span>」を発表した。 これは、全国<span style="color:#b0001e;font-weight:700;">50州</span>の学術基準を組み込み、教師が授業計画の作成、教材の個別最適化、データ活用による指導改善を支援することを目的としている。 <span style="color:#0d3461;font-weight:700;">Google</span>、<span style="color:#0d3461;font-weight:700;">OpenAI</span>、<span style="color:#0d3461;font-weight:700;">Khan Academy</span>なども既に同様の教育<span style="color:#0d3461;font-weight:700;">AI</span>製品を投入しており、教育現場における<span style="color:#0d3461;font-weight:700;">AI</span>活用の主導権争いが激化している。 <span style="color:#0d3461;font-weight:700;">Anthropic</span>はプライバシー保護も重視し、教師と<span style="color:#0d3461;font-weight:700;">AI</span>アシスタント間の会話をモデル訓練に利用しないことを明言している。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#111" font-weight="700" x="686" y="13">AIによるAI攻撃</text>
<line x1="684" y1="17" x2="936" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="910" y="24" clip-path="url(#c3)">GPT-Redが自己改善</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="888" y="24" clip-path="url(#c3)">安全性向上に新時代</text>
<foreignObject x="684" y="22" width="196" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:196px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">OpenAI</span>は、自社の<span style="color:#0d3461;font-weight:700;">AI</span>モデル「<span style="color:#0d3461;font-weight:700;">GPT-Red</span>」を発表した。 これは、将来の<span style="color:#0d3461;font-weight:700;">AI</span>モデルをより堅牢で信頼できるものにするため、現在のモデルが脆弱性を自ら発見し、訓練中に攻撃を生成することで自己改善を図るものだ。 <span style="color:#0d3461;font-weight:700;">GPT-Red</span>は人間よりもはるかに高い攻撃成功率（<span style="color:#b0001e;font-weight:700;">84%</span>対<span style="color:#b0001e;font-weight:700;">13%</span>）を達成し、<span style="color:#0d3461;font-weight:700;">AI</span>安全保障の新時代を切り開く可能性を示している。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8" fill="#111" font-weight="700" x="488" y="13">オープンソースLLM躍進</text>
<line x1="486" y1="17" x2="684" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="661" y="24" clip-path="url(#c4)">コスト10分の1</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="642" y="24" clip-path="url(#c4)">性能差4ヶ月に縮小</text>
<foreignObject x="486" y="22" width="148" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:148px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;">オープンソースの大規模言語モデル（<span style="color:#0d3461;font-weight:700;">LLM</span>）が急速な進歩を遂げ、クローズドなフロンティアモデルとの性能差がわずか「<span style="color:#b0001e;font-weight:700;">4ヶ月</span>」に縮まり、コストは<span style="color:#b0001e;font-weight:700;">10分の1</span>に抑えられている。 <span style="color:#0d3461;font-weight:700;">Zhipu AI</span>の「<span style="color:#0d3461;font-weight:700;">GLM-5.2</span>」のようなモデルは、その性能とコスト効率で注目を集めている。 この傾向は、<span style="color:#0d3461;font-weight:700;">AI</span>開発の民主化を加速する可能性がある。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="11">クローム拡張機能に脆弱性</text>
<line x1="324" y1="15" x2="486" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="19" clip-path="url(#cr1)">Claude、機密情報漏洩の危険</text>
<foreignObject x="324" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Anthropic</span>の「<span style="color:#0d3461;font-weight:700;">Claude for Chrome</span>」拡張機能に、悪意ある拡張機能が<span style="color:#0d3461;font-weight:700;">Gmail</span>や<span style="color:#0d3461;font-weight:700;">Googleドキュメント</span>にアクセスできる脆弱性が見つかった。 <span style="color:#0d3461;font-weight:700;">Manifold Security</span>は<span style="color:#b0001e;font-weight:700;">5月</span>の報告後も未解決と指摘する。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="276">NY州、AIデータセンター規制</text>
<line x1="324" y1="280" x2="486" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="284" clip-path="url(#cr2)">新規建設に1年間停止措置</text>
<foreignObject x="324" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">ニューヨーク州</span>が、新規<span style="color:#0d3461;font-weight:700;">AIデータセンター</span>建設に対し<span style="color:#b0001e;font-weight:700;">1年間</span>の一時停止措置を導入。 州は、インフラへの影響と電力消費増加への懸念から、慎重な姿勢を示している。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="11">Gemini、Chrome連携強化</text>
<line x1="162" y1="15" x2="324" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="19" clip-path="url(#cm1)">Android版に専用ショートカット</text>
<foreignObject x="162" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Google</span>は、<span style="color:#0d3461;font-weight:700;">Gemini</span>と<span style="color:#0d3461;font-weight:700;">Chrome</span>の統合を拡大し、<span style="color:#0d3461;font-weight:700;">Android</span>版<span style="color:#0d3461;font-weight:700;">Chrome</span>に専用ショートカットを展開中。 多タブ間の情報比較を容易にし、ユーザー体験向上を目指す。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="276">Claude Science、研究支援へ</text>
<line x1="162" y1="280" x2="324" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="284" clip-path="url(#cm2)">60以上のコネクタ提供</text>
<foreignObject x="162" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Anthropic</span>が科学研究向け<span style="color:#0d3461;font-weight:700;">AI</span>ツール「<span style="color:#0d3461;font-weight:700;">Claude Science</span>」を発表。 ゲノム解析など<span style="color:#b0001e;font-weight:700;">60以上</span>のコネクタで研究ワークフローを最適化。 ただし、科学的正確性の確保が課題とされる。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="11">ASML、2026年売上予測上方修正</text>
<line x1="0" y1="15" x2="162" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="19" clip-path="url(#cl1)">AIチップ需要が牽引</text>
<foreignObject x="0" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">半導体製造装置大手<span style="color:#0d3461;font-weight:700;">ASML</span>は、<span style="color:#b0001e;font-weight:700;">2026年</span>の売上予測を<span style="color:#b0001e;font-weight:700;">430億～450億ユーロ</span>に上方修正した。 <span style="color:#0d3461;font-weight:700;">AIチップ</span>需要の急増が好調を牽引している。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="276">Azure OpenAIに脆弱性修正</text>
<line x1="0" y1="280" x2="162" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="284" clip-path="url(#cl2)">Microsoft 7月パッチで対応</text>
<foreignObject x="0" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Microsoft</span>の<span style="color:#b0001e;font-weight:700;">7月</span>のセキュリティパッチで、<span style="color:#0d3461;font-weight:700;">Azure OpenAI</span>に関連する<span style="color:#b0001e;font-weight:700;">621件</span>の脆弱性が修正された。 悪用されると特権昇格の恐れがあった。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="1202" y="543">AI著作権訴訟、激化の一途</text>
<line x1="1200" y1="547" x2="1800" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1770" y="552" clip-path="url(#cda)">GoogleとOpenAIが標的</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1748" y="552" clip-path="url(#cda)">学習データ巡る攻防</text>
<foreignObject x="1200" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;">生成<span style="color:#0d3461;font-weight:700;">AI</span>モデルの訓練データに関する著作権侵害訴訟が世界的に激化している。<span style="color:#0d3461;font-weight:700;">ハシェット・ブック・グループ</span>をはじめとする複数の大手出版社が、<span style="color:#0d3461;font-weight:700;">Google</span>と<span style="color:#0d3461;font-weight:700;">OpenAI</span>を相手取り、著作権で保護された書籍を無断で<span style="color:#0d3461;font-weight:700;">AI</span>システム（<span style="color:#0d3461;font-weight:700;">Google</span>の<span style="color:#0d3461;font-weight:700;">Gemini</span>や<span style="color:#0d3461;font-weight:700;">OpenAI</span>の<span style="color:#0d3461;font-weight:700;">GPT</span>シリーズなど）の訓練に使用したとして提訴した。 これらの訴訟は、<span style="color:#0d3461;font-weight:700;">AI</span>が生成するコンテンツの「質」と「独創性」を支える膨大なデータセットの合法性を問うものであり、<span style="color:#0d3461;font-weight:700;">AI</span>産業全体の将来に大きな影響を与える可能性がある。特に、<span style="color:#0d3461;font-weight:700;">Google</span>はわずか<span style="color:#b0001e;font-weight:700;">2日間</span>で<span style="color:#b0001e;font-weight:700;">2件目</span>の著作権訴訟に直面しており、法廷での攻防はさらに複雑化すると見られている。 <span style="color:#0d3461;font-weight:700;">AI</span>モデルの透明性と公正なデータ利用に関する議論が、今後も熱を帯びることは必至だ。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="602" y="543">AIが社会に与える光と影</text>
<line x1="600" y1="547" x2="1200" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1170" y="552" clip-path="url(#cdb)">雇用、医療、犯罪…多角的な影響</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1148" y="552" clip-path="url(#cdb)">進化と倫理の狭間で</text>
<foreignObject x="600" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">AI</span>技術の急速な進化は、社会の様々な側面に光と影を投げかけている。<span style="color:#0d3461;font-weight:700;">Meta</span>は<span style="color:#0d3461;font-weight:700;">AI</span>を利用した従業員解雇で訴訟に直面しており、<span style="color:#AI</span>が雇用市場に与える影響が現実のものとなっている。 一方、医療分野では希望の光も見えている。<span style="color:#AI</span>が設計した「ユニバーサルワクチン」が初の人間臨床試験をパスし、将来のパンデミックを防ぐ可能性を秘めている。 また、<span style="color:#AI</span>チャットボットが精神科薬の処方を医師の承認なしに行うパイロットプログラムも開始された。 しかし、負の側面も顕在化している。<span style="color:#フロリダ州</span>では、<span style="color:#AI</span>顔認証システムの誤作動により市民が誤認逮捕される事件が発生し、技術の信頼性と倫理的な問題が浮上。 <span style="color:#AI</span>は人間の生活を豊かにする一方で、その利用には厳格な監視と倫理的枠組みの構築が不可欠であることが示されている。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="2" y="543">AIインフラ、国際競争を加速</text>
<line x1="0" y1="547" x2="600" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="570" y="552" clip-path="url(#cdc)">世界各地で投資活発化</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="548" y="552" clip-path="url(#cdc)">国家間の連携と戦略</text>
<foreignObject x="0" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">AI</span>の進化を支えるインフラへの投資が世界各地で活発化しており、国家間の競争と連携が加速している。<span style="color:#0d3461;font-weight:700;">Tower Semi</span>は<span style="color:#日本</span>で<span style="color:#b0001e;font-weight:700;">30億ドル</span>を投じ、<span style="color:#0d3461;font-weight:700;">AIシリコンフォトニクス</span>の工場を拡張する計画だ。 <span style="color:#0d3461;font-weight:700;">Envision</span>は、砂漠地帯に<span style="color:#b0001e;font-weight:700;">5GW</span>規模のデータセンターを建設し、<span style="color:#AI</span>を活用してボトルネックを解消することで、世界の<span style="color:#AI</span>競争を支える構えを見せている。 政府レベルでの<span style="color:#AI</span>活用も進み、<span style="color:#カナダ</span>の<span style="color:#アルバート州</span>は<span style="color:#AI</span>を用いて<span style="color:#b0001e;font-weight:700;">20億ドル</span>規模の政府ソフトウェアを再構築するプロジェクトに着手した。 国際的な協力も強化されており、<span style="color:#米国</span>と<span style="color:#日本</span>は広範な<span style="color:#AI</span>・技術協力協定を発表し、<span style="color:#英国</span>と<span style="color:#カナダ</span>も<span style="color:#AIコンピューティング</span>に関する協定を締結している。 また、<span style="color:#中国</span>の<span style="color:#0d3461;font-weight:700;">Huawei</span>は、製鉄業向け<span style="color:#AI</span>モデルを展開し、コストと効率の最適化を図るなど、<span style="color:#AI</span>が各国産業の競争力強化に不可欠な要素となっていることを示している。</p></div></foreignObject>
