            padding:0 8px;color:#111;">
  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">国連</span>主催の「<span style="color:#0d3461;font-weight:700;">AI統治に関するグローバル対話</span>」が<span style="color:#b0001e;font-weight:700;">7月6日</span>、<span style="color:#0d3461;font-weight:700;">スイス・ジュネーブ</span>で開幕した。<span style="color:#b0001e;font-weight:700;">193</span>の国連加盟国に加え、産業界・学術界・市民社会が一堂に会し、急速に進化するAI技術の規制枠組みを<span style="color:#b0001e;font-weight:700;">2日間</span>にわたり議論する。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">拘束力なき対話、次回はニューヨーク</p>
  <p style="text-indent:1em;margin:0 0 2px;">本対話は<span style="color:#0d3461;font-weight:700;">インターネット・ガバナンス・フォーラム</span>を範とした非拘束型の設計で、最終的に共同議長サマリーを発出する方式を採用。<span style="color:#0d3461;font-weight:700;">グテーレス国連事務総長</span>は開会演説で「AIが人類の未来を"ノリと勢い"で書き換えることを許してはならない」と強く警告した。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">ホワイトハウスも自主基準を準備中</p>
  <p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">米ホワイトハウス</span>は同週中にも自主的AIモデル基準を発表する見通し。次回対話は<span style="color:#b0001e;font-weight:700;">2027年5月</span>に<span style="color:#0d3461;font-weight:700;">ニューヨーク</span>で開催予定。AIガバナンスの国際的な枠組み整備に向けた機運が急速に高まっている。</p>
