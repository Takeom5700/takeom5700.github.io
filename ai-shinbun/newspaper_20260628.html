/* ── デスク背景（暗い木目調）── */

  background:#e8dfc8;

  transform: perspective(2600px) rotateX(0.55deg) rotateY(-0.4deg) rotate(-0.12deg);
  transform-origin: 50% 50%;
  /* 多層シャドウで紙の立体感・厚み */
  box-shadow:
    -5px 0 10px rgba(0,0,0,0.3),
    3px 5px 20px rgba(0,0,0,0.4),
    8px 12px 50px rgba(0,0,0,0.5),
    0 35px 90px rgba(0,0,0,0.65),
    inset 0 0 120px rgba(180,140,80,0.06);
  border-radius:0 0 2px 2px;
}

/* ── マストヘッド：わずかに黄ばんだ上部 ── */

  flex-shrink:0;
  border-bottom:3px double #111;

.men-bar span{padding:0 10px;border-right:1px solid #4a3a20;}
.men-bar span:first-child{padding-left:0;}
.paper-svg{flex:1;min-height:0;display:block;width:100%;}
.footer{

  display:flex;justify-content:space-between;
  font-family:'Noto Sans JP',sans-serif;font-size:7.5px;color:#776655;

      values="0 0 0 0 0.98

      in="noiseMap" result="lightGrain"/>
    <feBlend in="SourceGraphic" in2="lightGrain" mode="multiply"/>

    <feDisplacementMap in="SourceGraphic" in2="warpField" scale="2.2"
