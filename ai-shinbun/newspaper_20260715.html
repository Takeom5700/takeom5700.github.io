<p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">オープンAI</span>は次世代モデル「<span style="color:#0d3461;font-weight:700;">GPT-5.6</span>」を一般公開した。米政府の要請で<span style="color:#b0001e;font-weight:700;">12日間</span>の安全審査を経ての解禁となった。</p><p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">サイバー能力を懸念</p><p style="text-indent:1em;margin:0 0 2px;">国家サイバー長官室などが主導し、内部評価でサイバー攻撃関連の能力が<span style="color:#b0001e;font-weight:700;">96.7%</span>と高リスク水準を超えたことが背景にある。当初は約<span style="color:#b0001e;font-weight:700;">20の組織</span>に限定提供された。</p><p style="text-indent:1em;">審査後の<span style="color:#b0001e;font-weight:700;">7月9日</span>、「Sol」「Terra」「Luna」の3系統が正式に一般提供され、欧州企業からは制限による影響を懸念する声も出ている。</p>
