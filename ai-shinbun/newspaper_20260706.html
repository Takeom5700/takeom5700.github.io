  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">Anthropic</span>が自己報告ベースの年間経常収益（ARR）で<span style="color:#b0001e;font-weight:700;">470億ドル</span>を突破し、<span style="color:#0d3461;font-weight:700;">OpenAI</span>の<span style="color:#b0001e;font-weight:700;">250〜330億ドル</span>を上回ったことが明らかになった。<span style="color:#b0001e;font-weight:700;">7月3日</span>時点の数値で、企業向けAPIと<span style="color:#0d3461;font-weight:700;">Claude</span>サブスクリプションの急拡大が牽引した。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">Claude Sonnet 5が起爆剤</p>
  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#b0001e;font-weight:700;">6月30日</span>に公開された<span style="color:#0d3461;font-weight:700;">Claude Sonnet 5</span>は<span style="color:#b0001e;font-weight:700;">7月1日</span>から全無料・有料ユーザーのデフォルトモデルに昇格。入力<span style="color:#b0001e;font-weight:700;">100万トークンあたり2ドル</span>という低価格を維持しながら、旗艦モデル<span style="color:#0d3461;font-weight:700;">Opus 4.8</span>に匹敵するエージェント性能を発揮する。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">VC資金も独占</p>
  <p style="text-indent:1em;">上半期のグローバルVC投資総額<span style="color:#b0001e;font-weight:700;">5100億ドル</span>のうち<span style="color:#b0001e;font-weight:700;">43%</span>を<span style="color:#0d3461;font-weight:700;">OpenAI</span>と<span style="color:#0d3461;font-weight:700;">Anthropic</span>の<span style="color:#b0001e;font-weight:700;">2社</span>で占めた。AI産業への資本集中は前年比で加速しており、両社合計の調達額は<span style="color:#b0001e;font-weight:700;">2170億ドル</span>超に達する。</p>
