<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="1262" y="13">最先端AI市場を席巻</text>
<line x1="1260" y1="17" x2="1800" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1756" y="24" clip-path="url(#cm)">Google、新たな</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1716" y="24" clip-path="url(#cm)">Gemini発表</text>
<foreignObject x="1260" y="22" width="448" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:448px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">Google</span>は<span style="color:#b0001e;font-weight:700;">7月21日</span>、高性能な<span style="color:#0d3461;font-weight:700;">Flashモデル</span>を含む<span style="color:#b0001e;font-weight:700;">3</span>つの新たな<span style="color:#0d3461;font-weight:700;">Gemini AIモデル</span>を発表し、急速に進化する<span style="color:#0d3461;font-weight:700;">AI市場</span>で<span style="color:#0d3461;font-weight:700;">OpenAI</span>や<span style="color:#0d3461;font-weight:700;">Anthropic</span>との競争をさらに激化させています。新モデルには、コーディングや財務分析で前世代を上回る「<span style="color:#0d3461;font-weight:700;">Gemini 3.6 Flash</span>」、ソフトウェアのセキュリティ脆弱性検出に特化した「<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Flash Cyber</span>」、軽量<span style="color:#0d3461;font-weight:700;">AIエージェント</span>や自律型デジタルアシスタント向けの「<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Flash-Lite</span>」が含まれます。</p><p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">Flashモデルの戦略</p><p style="text-indent:1em;margin:0 0 2px;">特に<span style="color:#0d3461;font-weight:700;">Flashモデル</span>は、性能、速度、コストのバランスを重視し、大規模モデルの費用を抑えつつ高品質な<span style="color:#0d3461;font-weight:700;">AI機能</span>を提供することを目指しています。これは<span style="color:#0d3461;font-weight:700;">サイバーセキュリティ分野</span>への<span style="color:#0d3461;font-weight:700;">Google</span>の注力姿勢を示すもので、競合も高度な<span style="color:#0d3461;font-weight:700;">AIシステム</span>を投入し、ソフトウェアの脆弱性検出やセキュリティ研究者支援を強化しています。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="938" y="13">企業向けAI、熾烈な競争</text>
<line x1="936" y1="17" x2="1260" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1229" y="24" clip-path="url(#c2)">ChatGPT Work</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1201" y="24" clip-path="url(#c2)">1000万利用者突破</text>
<foreignObject x="936" y="22" width="257" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:257px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 7px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">米OpenAI</span>の「<span style="color:#0d3461;font-weight:700;">ChatGPT Work</span>」と、コーディング支援ツール「<span style="color:#0d3461;font-weight:700;">Codex</span>」の週間利用者数が<span style="color:#b0001e;font-weight:700;">1000万人</span>に到達しました。<span style="color:#b0001e;font-weight:700;">7月9日</span>の一般提供開始以来、利用者は急増しており、ビジネス現場における自律型<span style="color:#0d3461;font-weight:700;">AIソフトウェア</span>への強い需要を浮き彫りにしています。この市場では、競合である<span style="color:#0d3461;font-weight:700;">Anthropic</span>が提供する「<span style="color:#0d3461;font-weight:700;">Cowork</span>」も強力な基盤を築いており、企業向け<span style="color:#0d3461;font-weight:700;">AI</span>市場での競争はさらに激化しています。<span style="color:#0d3461;font-weight:700;">OpenAI</span>と<span style="color:#0d3461;font-weight:700;">Anthropic</span>は、それぞれの強みを活かし、市場シェアを拡大しようと注力しています。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#111" font-weight="700" x="686" y="13">経済産業省が主導</text>
<line x1="684" y1="17" x2="936" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="910" y="24" clip-path="url(#c3)">フィジカルAI政策</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="888" y="24" clip-path="url(#c3)">ロボット開発加速</text>
<foreignObject x="684" y="22" width="196" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:196px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">経済産業省</span>は<span style="color:#b0001e;font-weight:700;">7月21日</span>、<span style="color:#0d3461;font-weight:700;">フィジカルAI政策</span>に関する対外発信イベントを開催しました。これを受け、<span style="color:#0d3461;font-weight:700;">富士通</span>と<span style="color:#0d3461;font-weight:700;">NVIDIA</span>が連携し、<span style="color:#0d3461;font-weight:700;">AI</span>を使ったロボット開発を加速すると発表しました。政策、研究開発、産業界が連携し、<span style="color:#0d3461;font-weight:700;">AI</span>が実世界で活用される社会に向けた一歩が示されました。この取り組みは、製造業などでの人手不足解消に貢献し、将来的に日本のものづくり技術の継承を支援する狙いがあります。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8" fill="#111" font-weight="700" x="488" y="13">各社LLM、進化止まらず</text>
<line x1="486" y1="17" x2="684" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="661" y="24" clip-path="url(#c4)">最適なLLM選び</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="642" y="24" clip-path="url(#c4)">導入の鍵に</text>
<foreignObject x="486" y="22" width="148" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:148px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;"><span style="color:#b0001e;font-weight:700;">2026年</span>の<span style="color:#0d3461;font-weight:700;">LLM市場</span>では、<span style="color:#0d3461;font-weight:700;">GPT-5.5</span>、<span style="color:#0d3461;font-weight:700;">Claude 4.5</span>、<span style="color:#0d3461;font-weight:700;">Gemini 3</span>が主要モデルとして競い合っています。各モデルには強みと弱みがあり、用途や予算、ガバナンス要件によって最適な選択が異なります。<span style="color:#0d3461;font-weight:700;">Claude 3.5</span>は安全性と推論能力、<span style="color:#0d3461;font-weight:700;">Gemini 1.5 Pro</span>はマルチモーダルタスクでリードしています。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="11">国連、AIの未来を議論</text>
<line x1="324" y1="15" x2="486" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="19" clip-path="url(#cr1)">国際協力で格差是正を</text>
<foreignObject x="324" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">国連事務総長グテーレス氏</span>は<span style="color:#b0001e;font-weight:700;">7月17日</span>、<span style="color:#0d3461;font-weight:700;">AI</span>が一部の権力ではなく全人類に利益をもたらすよう、政府と企業に国際協力を要請。技術が格差を広げる危険性を警告しました。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="276">新興AIの進化続く</text>
<line x1="324" y1="280" x2="486" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="284" clip-path="url(#cr2)">Grok、Kimiが新版</text>
<foreignObject x="324" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">xAI</span>は<span style="color:#b0001e;font-weight:700;">7月15日</span>に「<span style="color:#0d3461;font-weight:700;">Grok 4.5</span>」を、<span style="color:#0d3461;font-weight:700;">Moonshot AI</span>は同日に「<span style="color:#0d3461;font-weight:700;">Kimi K3</span>」をそれぞれリリース。競合がひしめく<span style="color:#0d3461;font-weight:700;">LLM市場</span>で存在感を示しています。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="11">OpenAI、複数モデル展開</text>
<line x1="162" y1="15" x2="324" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="19" clip-path="url(#cm1)">GPT-5.6シリーズ登場</text>
<foreignObject x="162" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">OpenAI</span>は<span style="color:#b0001e;font-weight:700;">7月8日</span>に「<span style="color:#0d3461;font-weight:700;">GPT-5.6 Luna</span>」「<span style="color:#0d3461;font-weight:700;">GPT-5.6 Sol</span>」「<span style="color:#0d3461;font-weight:700;">GPT-5.6 Terra</span>」の<span style="color:#b0001e;font-weight:700;">3</span>モデルを発表。用途に応じた多様な選択肢を提供し、競争力を強化しています。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="276">AIの法的課題浮上</text>
<line x1="162" y1="280" x2="324" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="284" clip-path="url(#cm2)">知財保護に新たな壁</text>
<foreignObject x="162" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#b0001e;font-weight:700;">2026年7月</span>、<span style="color:#0d3461;font-weight:700;">AI</span>関連の法的リスクが顕在化。特に知的財産権や企業秘密の保護が難しく、既存の法制度では対応しきれない状況が指摘されています。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="11">軽量AIエージェント</text>
<line x1="0" y1="15" x2="162" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="19" clip-path="url(#cl1)">自律化加速へ期待</text>
<foreignObject x="0" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Google</span>の「<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Flash-Lite</span>」など、軽量<span style="color:#0d3461;font-weight:700;">AIエージェント</span>や自律型デジタルアシスタントの開発が加速。より広範なデバイスへの<span style="color:#0d3461;font-weight:700;">AI</span>搭載が期待されます。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="276">サイバー防衛にAI</text>
<line x1="0" y1="280" x2="162" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="284" clip-path="url(#cl2)">脅威への対応強化</text>
<foreignObject x="0" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">Google</span>の「<span style="color:#0d3461;font-weight:700;">Gemini 3.5 Flash Cyber</span>」など、<span style="color:#0d3461;font-weight:700;">AI</span>によるサイバーセキュリティ分野への注力が進展。ソフトウェアの脆弱性検出や修正に貢献し、脅威対応を強化します。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="1202" y="543">LLM競争の最前線</text>
<line x1="1200" y1="547" x2="1800" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1770" y="552" clip-path="url(#cda)">ビジネス戦略を左右する</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1748" y="552" clip-path="url(#cda)">モデル選定の重要性</text>
<foreignObject x="1200" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;"><span style="color:#b0001e;font-weight:700;">2026年</span>の<span style="color:#0d3461;font-weight:700;">大規模言語モデル（LLM）</span>市場は、<span style="color:#0d3461;font-weight:700;">OpenAI</span>の<span style="color:#0d3461;font-weight:700;">GPT-5.1</span>、<span style="color:#0d3461;font-weight:700;">Anthropic</span>の<span style="color:#0d3461;font-weight:700;">Claude 4.5 Opus</span>、<span style="color:#0d3461;font-weight:700;">Google</span>の<span style="color:#0d3461;font-weight:700;">Gemini 3</span>が三つ巴の激戦を展開しています。これらのモデルは顧客サービスから生産性ツール、複雑なエンジニアリングワークフローに至るまで、あらゆるビジネス領域に浸透。基盤モデルの選択は単なる技術的決定ではなく、顧客体験（<span style="color:#0d3461;font-weight:700;">CX</span>）、運用効率、コスト、リスクとコンプライアンス、拡張性など、事業の根幹に深く影響を及ぼす戦略的コミットメントとなっています。各社は自社の強みを活かし、市場での優位性を確立しようと投資を続けていますが、最適な<span style="color:#0d3461;font-weight:700;">LLM</span>は「こなすべき仕事」によって異なります。高品質なコーディングや難解な推論タスクには高価なフロンティアモデルが有効な一方、タグ付けやルーティング、データ抽出などではコスト効率の良いモデルが求められます。企業はロゴではなく、具体的なユースケースと総合的な提供計画に基づいて評価を行うべきです。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="602" y="543">AIと実世界の融合</text>
<line x1="600" y1="547" x2="1200" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1170" y="552" clip-path="url(#cdb)">日本のフィジカルAI戦略</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1148" y="552" clip-path="url(#cdb)">産業界が連携</text>
<foreignObject x="600" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;"><span style="color:#0d3461;font-weight:700;">経済産業省</span>は<span style="color:#b0001e;font-weight:700;">7月21日</span>、<span style="color:#0d3461;font-weight:700;">フィジカルAI政策</span>に関する対外発信イベントを開催し、<span style="color:#0d3461;font-weight:700;">AI</span>が実世界で働く社会の実現に向けたロードマップを示しました。このイベントでは、<span style="color:#0d3461;font-weight:700;">NEDO</span>、<span style="color:#0d3461;font-weight:700;">NVIDIA</span>といった研究開発機関や企業が登壇し、政策と研究開発、産業界の緊密な連携の重要性が強調されました。具体的には、<span style="color:#0d3461;font-weight:700;">富士通</span>と<span style="color:#0d3461;font-weight:700;">NVIDIA</span>の提携により、<span style="color:#0d3461;font-weight:700;">AI</span>で自律的に判断し動作するロボットの開発が加速します。この技術は製造業における人手不足の深刻化に対応し、生産性の向上だけでなく、熟練技術の継承にも寄与すると期待されています。将来的には、中小の町工場などでも<span style="color:#0d3461;font-weight:700;">AIロボット</span>が活用され、日本のものづくりの未来を支える可能性を秘めています。</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="2" y="543">AIの知的財産権</text>
<line x1="0" y1="547" x2="600" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="570" y="552" clip-path="url(#cdc)">新たな法的リスクと課題</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="548" y="552" clip-path="url(#cdc)">企業秘密保護の重要性</text>
<foreignObject x="0" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;"><span style="color:#b0001e;font-weight:700;">2026年7月</span>、<span style="color:#0d3461;font-weight:700;">生成AI</span>の急速な発展に伴い、知的財産権（<span style="color:#0d3461;font-weight:700;">IP</span>）と企業秘密に関する新たな法的リスクが浮上しています。<span style="color:#0d3461;font-weight:700;">AI</span>への巨額投資が進む中、革新的な<span style="color:#0d3461;font-weight:700;">AI</span>設計や利用における<span style="color:#0d3461;font-weight:700;">IP保護</span>は困難を極めると指摘されています。特に、<span style="color:#0d3461;font-weight:700;">AI</span>の根幹をなすニューラルネットワークやアルゴリズムの特許化は、抽象的なアイデア、数学的公式、自然の法則に該当するという理由で、より一層難しくなっています。米国の裁判所では、過去<span style="color:#b0001e;font-weight:700;">10年間</span>でソフトウェア特許への批判的な見方が強まっており、<span style="color:#0d3461;font-weight:700;">AI</span>ベースのアルゴリズムの特許適格性にも疑問が呈され始めています。この状況は、<span style="color:#0d3461;font-weight:700;">AI</span>開発企業が研究開発の成果を適切に保護するための戦略を見直す必要性を高めています。</p></div></foreignObject>
