<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="1262" y="13">AIモデル競争激化</text>
<line x1="1260" y1="17" x2="1800" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1756" y="24" clip-path="url(#cm)">価格破壊、新世代</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="36" writing-mode="tb-rl" x="1716" y="24" clip-path="url(#cm)">AIが市場席巻へ</text>
<foreignObject x="1260" y="22" width="448" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:448px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">AI</span>市場は<span style="color:#2b102b;font-weight:700;">2026年7月</span>上旬、新たなモデルの登場と価格競争により大きな転換期を迎えました。<span style="color:#0d3461;font-weight:700;">SpaceXAI</span>は<span style="color:#b0001e;font-weight:700;">7月8日</span>に「<span style="color:#0d3461;font-weight:700;">Grok 4.5</span>」を、<span style="color:#0d3461;font-weight:700;">OpenAI</span>は翌日に「<span style="color:#0d3461;font-weight:700;">GPT-5.6</span>」（<span style="color:#0d3461;font-weight:700;">Sol</span>、<span style="color:#0d3461;font-weight:700;">Terra</span>、<span style="color:#0d3461;font-weight:700;">Luna</span>）を、そして<span style="color:#0d3461;font-weight:700;">Meta</span>は「<span style="color:#0d3461;font-weight:700;">Muse Spark 1.1</span>」を相次いで発表。これにより、<span style="color:#b0001e;font-weight:700;">AI</span>推論コストはこれまでにない低水準にまで急落しました。特に<span style="color:#0d3461;font-weight:700;">OpenAI</span>の<span style="color:#0d3461;font-weight:700;">Luna</span>は、<span style="color:#b0001e;font-weight:700;">100万</span>入力トークンあたりわずか<span style="color:#b0001e;font-weight:700;">1ドル</span>、出力トークンあたり<span style="color:#b0001e;font-weight:700;">6ドル</span>という価格設定で、先行する<span style="color:#0d3461;font-weight:700;">Anthropic</span>の<span style="color:#0d3461;font-weight:700;">Opus 4.8</span>の<span style="color:#b0001e;font-weight:700;">25ドル</span>や<span style="color:#0d3461;font-weight:700;">GPT-5.6 Sol</span>の<span style="color:#b0001e;font-weight:700;">30ドル</span>と比較して大幅なコスト削減を実現しています。この価格競争は、企業が<span style="color:#0d3461;font-weight:700;">AI</span>モデルを導入する障壁を大きく下げ、<span style="color:#0d3461;font-weight:700;">AI</span>が企業ワークフローに深く組み込まれる「エージェント時代」の到来を加速させています。大手<span style="color:#0d3461;font-weight:700;">AI</span>企業は、もはや性能だけでなく、単価効率とワークフローへの統合を重視しており、市場は「経済的圧縮」の段階に入ったと分析されています。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="9" fill="#111" font-weight="700" x="938" y="13">上海で世界AI大会開幕</text>
<line x1="936" y1="17" x2="1260" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1229" y="24" clip-path="url(#c2)">中国、AI投資と</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="24" writing-mode="tb-rl" x="1201" y="24" clip-path="url(#c2)">国際協力に意欲</text>
<foreignObject x="936" y="22" width="257" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:257px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 7px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">中国</span>の上海で<span style="color:#b0001e;font-weight:700;">7月17日</span>、「<span style="color:#0d3461;font-weight:700;">世界人工知能大会</span>」が開幕しました。世界最大級の<span style="color:#0d3461;font-weight:700;">AI</span>展示会である今回は、<span style="color:#b0001e;font-weight:700;">1100社</span>を超える関連企業が出展。開幕式には<span style="color:#b0001e;font-weight:700;">2018年</span>の初回以来初めて<span style="color:#0d3461;font-weight:700;">習近平国家主席</span>が出席し、「公正かつ合理的なグローバルな人工知能ガバナンス体制を構築すべきだ」と演説しました。主席はまた、<span style="color:#0d3461;font-weight:700;">AI</span>は一部の国が独占すべきではないと暗に<span style="color:#0d3461;font-weight:700;">米国</span>を牽制しました。さらに、<span style="color:#0d3461;font-weight:700;">中国</span>は今後<span style="color:#b0001e;font-weight:700;">5年間</span>で<span style="color:#b0001e;font-weight:700;">2950億ドル</span>を<span style="color:#0d3461;font-weight:700;">AI</span>データセンタープロジェクトに投資する計画を発表。これは<span style="color:#0d3461;font-weight:700;">米国</span>の<span style="color:#0d3461;font-weight:700;">ハイパースケーラー</span>各社の投資額には及ばないものの、安価な労働力や部品により費用対効果の高い構築を目指します。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#111" font-weight="700" x="686" y="13">AI規制の波、米国で拡大</text>
<line x1="684" y1="17" x2="936" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="910" y="24" clip-path="url(#c3)">倫理的課題浮上</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="18" writing-mode="tb-rl" x="888" y="24" clip-path="url(#c3)">各国で法整備進む</text>
<foreignObject x="684" y="22" width="196" height="508"><div xmlns="http://www.w3.org/1993/xhtml" style="writing-mode:vertical-rl;height:508px;width:196px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;">
米国では<span style="color:#2b102b;font-weight:700;">2026年7月</span>、<span style="color:#0d3461;font-weight:700;">AI</span>に関する法整備が急速に進展しています。<span style="color:#0d3461;font-weight:700;">ハワイ州</span>は<span style="color:#b0001e;font-weight:700;">7月13日</span>にチャットボットの安全性とディープフェイク保護法案に署名。<span style="color:#0d3461;font-weight:700;">イリノイ州</span>は教員評価や医療承認における<span style="color:#0d3461;font-weight:700;">AI</span>使用を制限する法案を可決しました。<span style="color:#0d3461;font-weight:700;">ニューヨーク州</span>も子供向けチャットボット安全法案などを可決。こうした動きの背景には、<span style="color:#b0001e;font-weight:700;">約200人</span>の経済学者や技術リーダーが<span style="color:#0d3461;font-weight:700;">AI</span>による大規模な失業や社会への脅威を警告する声明を発表したことがあります。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8" fill="#111" font-weight="700" x="488" y="13">Meta、AI機能撤回</text>
<line x1="486" y1="17" x2="684" y2="17" stroke="#aaa" stroke-width="0.5"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="661" y="24" clip-path="url(#c4)">Googleはアフリカ</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="15" writing-mode="tb-rl" x="642" y="24" clip-path="url(#c4)">支援ラボ設立</text>
<foreignObject x="486" y="22" width="148" height="508"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:508px;width:148px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 6px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">Meta</span>は最近導入した<span style="color:#0d3461;font-weight:700;">Instagram</span>の<span style="color:#0d3461;font-weight:700;">AI</span>写真加工機能を、ユーザーからの反発を受け撤回しました。「狙いを外した」と認め、提供を停止。一方、<span style="color:#0d3461;font-weight:700;">Google</span>は<span style="color:#0d3461;font-weight:700;">アフリカ</span>の<span style="color:#0d3461;font-weight:700;">AI</span>研究者と起業家を支援する「<span style="color:#0d3461;font-weight:700;">Google Africa Applied AI Lab</span>」を<span style="color:#0d3461;font-weight:700;">アクラ</span>に開設し、地域特有の課題解決を目指します。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="11">Anthropic大型契約</text>
<line x1="324" y1="15" x2="486" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="19" clip-path="url(#cr1)">SpaceXAIと連携</text>
<foreignObject x="324" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">Anthropic</span>は<span style="color:#0d3461;font-weight:700;">SpaceX</span>の<span style="color:#0d3461;font-weight:700;">xAI</span>部門と<span style="color:#b0001e;font-weight:700;">400億ドル</span>規模の計算リソース契約を締結。<span style="color:#0d3461;font-weight:700;">Colossus 1</span>データセンターの全出力を利用し、企業向け<span style="color:#0d3461;font-weight:700;">AI</span>市場での地位を確固たるものにしています。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="326" y="276">OpenAI、GPT-Live発表</text>
<line x1="324" y1="280" x2="486" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="469" y="284" clip-path="url(#cr2)">リアルタイム音声AI</text>
<foreignObject x="324" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">OpenAI</span>は、聞く、話す、推論を同時に行うリアルタイム音声<span style="color:#0d3461;font-weight:700;">AI</span>「<span style="color:#0d3461;font-weight:700;">GPT-Live</span>」を発表しました。これにより、より自然な会話体験が可能となり、<span style="color:#0d3461;font-weight:700;">AI</span>アシスタントが人間と遜色なくコミュニケーションできるようになります。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="11">DeepSeek独自チップ</text>
<line x1="162" y1="15" x2="324" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="19" clip-path="url(#cm1)">NVIDIA依存脱却へ</text>
<foreignObject x="162" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">中国</span>の<span style="color:#0d3461;font-weight:700;">AI</span>企業<span style="color:#0d3461;font-weight:700;">DeepSeek</span>が、<span style="color:#0d3461;font-weight:700;">NVIDIA</span>と<span style="color:#0d3461;font-weight:700;">Huawei</span>への依存を減らすため、カスタム推論シリコンの開発を発表しました。これにより、ハードウェア層の分散化が進む見込みです。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="164" y="276">自律型傘が登場</text>
<line x1="162" y1="280" x2="324" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="307" y="284" clip-path="url(#cm2)">AIが持ち主を追跡</text>
<foreignObject x="162" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">カナダ</span>のエンジニアが、コンピュータービジョンで持ち主を追尾し、雨から守る自律型傘のプロトタイプを開発しました。日常生活での<span style="color:#0d3461;font-weight:700;">AI</span>ロボット活用の一例です。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="11">EU、AIで運転強化</text>
<line x1="0" y1="15" x2="162" y2="15" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="19" clip-path="url(#cl1)">居眠り運転防止へ</text>
<foreignObject x="0" y="19" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">EU</span>は<span style="color:#b0001e;font-weight:700;">7月7日</span>より、新車にドライバーの不注意を検知する<span style="color:#0d3461;font-weight:700;">AI</span>システム搭載を義務付けました。これにより、交通安全の向上を目指します。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="7.5" fill="#5c3214" font-weight="700" x="2" y="276">上海でロボット続々</text>
<line x1="0" y1="280" x2="162" y2="280" stroke="#5c3214" stroke-width="0.7"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="13" writing-mode="tb-rl" x="145" y="284" clip-path="url(#cl2)">卓球ロボットも展示</text>
<foreignObject x="0" y="284" width="137" height="246"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:246px;width:137px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.85;text-align:justify;padding:0 5px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">世界人工知能大会</span>では、薬品選択ロボや卓球トレーニングロボットなど、多様な<span style="color:#0d3461;font-weight:700;">AI</span>搭載ロボットがデモンストレーションされました。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="1202" y="543">AI市場、価格と効率で再編</text>
<line x1="1200" y1="547" x2="1800" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1770" y="552" clip-path="url(#cda)">エージェント中心の</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1748" y="552" clip-path="url(#cda)">新時代へ突入</text>
<foreignObject x="1200" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;">
<span style="color:#2b102b;font-weight:700;">2026年7月</span>は<span style="color:#0d3461;font-weight:700;">AI</span>市場にとって「経済的圧縮」の時代を決定づける月となりました。新たな<span style="color:#0d3461;font-weight:700;">AI</span>モデル群、特に<span style="color:#0d3461;font-weight:700;">OpenAI</span>の「<span style="color:#0d3461;font-weight:700;">GPT-5.6 Luna</span>」、<span style="color:#0d3461;font-weight:700;">SpaceXAI</span>の「<span style="color:#0d3461;font-weight:700;">Grok 4.5</span>」、<span style="color:#0d3461;font-weight:700;">Meta</span>の「<span style="color:#0d3461;font-weight:700;">Muse Spark 1.1</span>」が軒並み推論コストを大幅に引き下げ、市場の価格構造を根本から変えつつあります。これらのモデルは、従来のフラッグシップモデルと比較して<span style="color:#b0001e;font-weight:700;">80%</span>以上のコスト削減を実現しており、企業が高性能<span style="color:#0d3461;font-weight:700;">AI</span>を大規模に導入する障壁が劇的に低下しました。
これにより、<span style="color:#0d3461;font-weight:700;">AI</span>業界の競争軸は、純粋な性能ベンチマークから「単価経済性」「トークン効率」「ワークフローへの統合」へとシフトしています。企業は、既存の<span style="color:#0d3461;font-weight:700;">SaaS</span>ライセンスや単一ベンダーの<span style="color:#0d3461;font-weight:700;">API</span>に依存するだけでなく、タスクに応じて最適な<span style="color:#0d3461;font-weight:700;">AI</span>モデルを柔軟に選択・統合する戦略が求められています。自律型<span style="color:#0d3461;font-weight:700;">AI</span>エージェントがソフトウェアをオンデマンドで構築できる時代が到来し、伝統的な企業ソフトウェアモデルは存続の危機に瀕しています。この経済的な変動は非常に深刻で、<span style="color:#0d3461;font-weight:700;">連邦準備制度理事会</span>が影響を分析するためのタスクフォースを立ち上げるほどです。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="602" y="543">Anthropic、企業AI市場を牽引</text>
<line x1="600" y1="547" x2="1200" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1170" y="552" clip-path="url(#cdb)">高い信頼性と</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="1148" y="552" clip-path="url(#cdb)">パートナーシップ</text>
<foreignObject x="600" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;">
<span style="color:#0d3461;font-weight:700;">Anthropic</span>は、<span style="color:#2b102b;font-weight:700;">2026年7月</span>現在、企業向け<span style="color:#0d3461;font-weight:700;">AI</span>市場で最大シェアを誇り、その存在感を強固にしています。 <span style="color:#0d3461;font-weight:700;">イーロン・マスク氏</span>でさえ、かつては懐疑的だった<span style="color:#0d3461;font-weight:700;">Anthropic</span>に対する見方を改め、「明らかに間違っていた」と認めるほどです。
同社のフラッグシップモデル「<span style="color:#0d3461;font-weight:700;">Claude Opus 4.8</span>」は、<span style="color:#2b102b;font-weight:700;">2026年5月</span>下旬にリリースされ、特にコーディングや長期にわたるエージェント作業において、競合を凌駕する性能を発揮しています。<span style="color:#0d3461;font-weight:700;">SWE-bench Verified</span>で<span style="color:#b0001e;font-weight:700;">80%台</span>後半、<span style="color:#0d3461;font-weight:700;">SWE-bench Pro</span>で<span style="color:#b0001e;font-weight:700;">60%台</span>後半という高いベンチマークスコアを記録し、その信頼性と正確性がビジネスユーザーから高く評価されています。
<span style="color:#0d3461;font-weight:700;">Anthropic</span>はまた、<span style="color:#0d3461;font-weight:700;">SpaceX</span>の<span style="color:#0d3461;font-weight:700;">xAI</span>部門から<span style="color:#b0001e;font-weight:700;">300</span>メガワットの計算能力を<span style="color:#b0001e;font-weight:700;">2029年5月</span>まで借り上げるという、月額<span style="color:#b0001e;font-weight:700;">12億5000万ドル</span>に上る大規模な契約を締結しました。 これは<span style="color:#0d3461;font-weight:700;">xAI</span>にとって<span style="color:#b0001e;font-weight:700;">400億ドル</span>もの収益をもたらす見込みで、<span style="color:#0d3461;font-weight:700;">Anthropic</span>が今後の<span style="color:#0d3461;font-weight:700;">AI</span>開発競争において強固な基盤を築いていることを示しています。
</p></div></foreignObject>
<text font-family="'Noto Sans JP'" font-size="8.5" fill="#0d3461" font-weight="700" x="2" y="543">AIの未来を巡る国際議論</text>
<line x1="0" y1="547" x2="600" y2="547" stroke="#0d3461" stroke-width="0.8"/>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="570" y="552" clip-path="url(#cdc)">ガバナンス構築と</text>
<text font-family="'Noto Serif JP'" font-weight="900" font-size="21" fill="#0d3461" writing-mode="tb-rl" x="548" y="552" clip-path="url(#cdc)">倫理的課題の壁</text>
<foreignObject x="0" y="552" width="540" height="348"><div xmlns="http://www.w3.org/1999/xhtml" style="writing-mode:vertical-rl;height:348px;width:540px;overflow:hidden;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;text-align:justify;padding:0 8px;color:#111;"><p style="text-indent:1em;">
<span style="color:#2b102b;font-weight:700;">2026年7月</span>、<span style="color:#0d3461;font-weight:700;">AI</span>の急速な進化がもたらす影響について、国際社会での議論が活発化しています。特に、<span style="color:#b0001e;font-weight:700;">約200人</span>の著名な経済学者や技術リーダーが「今すぐ行動すべきだ」と題した声明を発表し、<span style="color:#0d3461;font-weight:700;">AI</span>が今後<span style="color:#b0001e;font-weight:700;">10年</span>で「大幅に強力になる可能性」があり、大規模な雇用喪失などのリスクを伴う一方で、生活水準の大幅な向上といった機会ももたらす可能性があると指摘しました。 この声明には、<span style="color:#b0001e;font-weight:700;">15人</span>のノーベル賞受賞者や、<span style="color:#0d3461;font-weight:700;">OpenAI</span>と<span style="color:#0d3461;font-weight:700;">Anthropic</span>という主要<span style="color:#0d3461;font-weight:700;">AI</span>ラボのチーフエコノミストも名を連ねています。
また、<span style="color:#0d3461;font-weight:700;">中国</span>は<span style="color:#b0001e;font-weight:700;">7月16日</span>に<span style="color:#0d3461;font-weight:700;">上海</span>で新たな国際組織を設立し、<span style="color:#0d3461;font-weight:700;">ロシア</span>や<span style="color:#0d3461;font-weight:700;">パキスタン</span>を含む<span style="color:#b0001e;font-weight:700;">29カ国</span>が加盟。 <span style="color:#0d3461;font-weight:700;">習近平国家主席</span>は<span style="color:#b0001e;font-weight:700;">7月17日</span>の<span style="color:#0d3461;font-weight:700;">世界人工知能大会</span>での演説で、「<span style="color:#0d3461;font-weight:700;">AI</span>は人類にとって信頼できる道具でなければならない」とし、<span style="color:#0d3461;font-weight:700;">AI</span>ガバナンスの国際的な協調を訴えました。 これらの動きは、<span style="color:#0d3461;font-weight:700;">AI</span>技術の恩恵を最大化しつつ、その潜在的なリスクを管理するためのグローバルな枠組み構築が喫緊の課題であることを浮き彫りにしています。
</p></div></foreignObject>
