</text>

<text font-family="'Noto Serif JP','Yu Mincho',serif"

<foreignObject x="1260" y="22" width="448" height="508">
<div xmlns="http://www.w3.org/1999/xhtml"
     style="writing-mode:vertical-rl;height:508px;width:448px;overflow:hidden;
            font-family:'Noto Serif JP','Yu Mincho',serif;
            font-size:14px;line-height:1.85;text-align:justify;
            padding:0 8px;color:#111;">
  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">Anthropic</span>の最先端AIモデル「<span style="color:#0d3461;font-weight:700;">Claude Fable 5</span>」は、<span style="color:#b0001e;font-weight:700;">7月8日</span>をもってサブスクリプション内の無償提供を終了し、従量制課金へと移行した。<span style="color:#b0001e;font-weight:700;">7月7日</span>が最終無料利用日となり、本日以降は入力<span style="color:#b0001e;font-weight:700;">100万トークンあたり10ドル</span>、出力<span style="color:#b0001e;font-weight:700;">50ドル</span>の料金が発生する。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">輸出規制解除から急転直下の収益化</p>
  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">Fable 5</span>は<span style="color:#b0001e;font-weight:700;">6月12日</span>に<span style="color:#0d3461;font-weight:700;">米商務省</span>の輸出規制により一時提供停止を余儀なくされた経緯がある。<span style="color:#b0001e;font-weight:700;">6月30日</span>に規制解除を受けてグローバル再展開が実現したが、わずか<span style="color:#b0001e;font-weight:700;">8日間</span>のフリーアクセス期間を経て即座に有償化へ踏み切る判断は業界に驚きをもって受け止められている。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">企業導入コストへの影響は甚大</p>
  <p style="text-indent:1em;">大規模利用企業では月次コストが数倍に跳ね上がる試算もあり、代替モデルへの移行を検討する動きが広がる。同社は「収益化により安全研究への再投資を加速する」と説明しており、<span style="color:#0d3461;font-weight:700;">Claude Sonnet 5</span>は引き続き<span style="color:#0d3461;font-weight:700;">ProおよびFreeプラン</span>でデフォルトとして提供される。</p>
