<foreignObject x="1260" y="22" width="448" height="508">

            padding:0 8px;color:#111;">
  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">アンソロピック</span>は<span style="color:#b0001e;font-weight:700;">7月1日</span>、最新AIモデル「<span style="color:#0d3461;font-weight:700;">クロード・ソネット5</span>」を全ての無料・有料ユーザー向けにデフォルトモデルとして正式公開した。同社はこれを「史上最もエージェント的なソネット」と位置づけ、フラッグシップ機「<span style="color:#0d3461;font-weight:700;">オーパス4.8</span>」に迫る性能を大幅に低いコストで提供する。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">ベンチマーク性能</p>
  <p style="text-indent:1em;margin:0 0 2px;">エージェント型コーディング評価では<span style="color:#b0001e;font-weight:700;">63.2%</span>、ターミナル操作ベンチマーク「<span style="color:#0d3461;font-weight:700;">Terminal-Bench</span>」では<span style="color:#b0001e;font-weight:700;">80.4%</span>のスコアを記録。<span style="color:#b0001e;font-weight:700;">8月31日</span>までの特別価格は入力<span style="color:#b0001e;font-weight:700;">100万トークンあたり2ドル</span>、出力<span style="color:#b0001e;font-weight:700;">10ドル</span>と競合比で割安な水準に設定された。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">脆弱性発見でも実績</p>
  <p style="text-indent:1em;">関連AIシステム「<span style="color:#0d3461;font-weight:700;">クロード・ミトス</span>」は<span style="color:#b0001e;font-weight:700;">29年間</span>見落とされていたLinuxカーネルの脆弱性「<span style="color:#0d3461;font-weight:700;">Squidbleed</span>（CVE-2026-47729）」を自律発見し、AI活用によるセキュリティ研究の新局面を示した。</p>
