  <p style="text-indent:1em;margin:0 0 2px;"><span style="color:#0d3461;font-weight:700;">アンソロピック</span>は<span style="color:#b0001e;font-weight:700;">6月30日</span>、同社の中位モデル最新作<span style="color:#0d3461;font-weight:700;">「Claude Sonnet 5」</span>を発表し、<span style="color:#b0001e;font-weight:700;">7月1日</span>より全プランのデフォルトモデルとして提供を開始した。エージェントコーディング性能では<span style="color:#b0001e;font-weight:700;">63.2%</span>を記録し、上位モデルの<span style="color:#0d3461;font-weight:700;">Opus 4.8</span>に迫る精度を実現している。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">破格の導入価格設定</p>
  <p style="text-indent:1em;margin:0 0 2px;">料金は入力<span style="color:#b0001e;font-weight:700;">100万トークンあたり2ドル</span>、出力<span style="color:#b0001e;font-weight:700;">10ドル</span>と設定されており、これは<span style="color:#b0001e;font-weight:700;">8月31日</span>までの期間限定価格となる。同日以降は<span style="color:#b0001e;font-weight:700;">3ドル・15ドル</span>に改定される予定だ。利用可能なプラットフォームは<span style="color:#0d3461;font-weight:700;">Claude API</span>、<span style="color:#0d3461;font-weight:700;">Amazon Bedrock</span>、<span style="color:#0d3461;font-weight:700;">Google Cloud</span>、<span style="color:#0d3461;font-weight:700;">Microsoft Azure</span>と幅広い。</p>
  <p style="font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
            color:#b0001e;border-right:2.5px solid #b0001e;padding-right:3px;margin:5px 0 2px;">コンテキスト100万トークン対応</p>
  <p style="text-indent:1em;">コンテキストウィンドウは<span style="color:#b0001e;font-weight:700;">100万トークン</span>に対応し、自律的な計画立案・ブラウザ操作・ターミナル実行など高度なエージェント機能を備える。企業の<span style="color:#0d3461;font-weight:700;">AI導入コスト</span>を大幅に削減する起爆剤となることが期待される。</p>
